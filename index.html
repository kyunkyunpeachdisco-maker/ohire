function maybeShowNightlyProposal(draft) {
  const p = draft.nightlyProposal;
  if (!p || typeof p.body !== 'string') return;
  // 提案は一度表示したら消費する（以後はdiff UIが引き継ぐ）
  const drafts = getDrafts();
  const idx = drafts.findIndex(d => d.id === draft.id);
  if (idx >= 0) { delete drafts[idx].nightlyProposal; saveDraftsToStorage(drafts); }
  const current = document.getElementById('editor').value;
  if (p.body.trim() === current.trim()) return;
  if (p.summary) addMessage('ai', '🌙 夜間リライト案: ' + p.summary, null, 'system');
  showInlineDiff(current, p.body);
  showEditorBadge('🌙 夜間リライト案');
}

function loadDraft(id) {
  const draft = getDrafts().find(d => d.id === id);
  if (!draft) return;
  saveChatLog(); // 切り替え前の履歴を保存
  saveChatMemo();
  currentDraftId = id;
  localStorage.setItem('note_current_draft_id', id);
  document.getElementById('title-input').value = draft.title === '（無題）' ? '' : draft.title;
  document.getElementById('editor').value = draft.body;
  autoResize(document.getElementById('title-input'));
  // チャット履歴をこの下書き用に切り替え
  clearChatUI();
  const savedLog = localStorage.getItem('note_chat_log_' + id);
  if (savedLog) {
    try {
      chatLog = JSON.parse(savedLog);
      chatLog.forEach(m => restoreChatMessage(m));
      if (chatLog.length > 0) document.getElementById('chat-empty')?.remove();
    } catch {}
  }
  loadChatMemo(id);
  maybeShowNightlyProposal(draft);
  closeDrafts();
  showToast('📄 読み込みました');
}

function deleteDraft(id, e) {
  e.stopPropagation();
  if (!confirm('この下書きを削除しますか？')) return;
  const drafts = getDrafts().filter(d => d.id !== id);
  saveDraftsToStorage(drafts);
  localStorage.removeItem('note_chat_log_' + id);
  localStorage.removeItem('note_chat_memo_' + id);
  localStorage.removeItem('note_snapshots_' + id);
  if (currentDraftId === id) {
    currentDraftId = null;
    localStorage.removeItem('note_current_draft_id');
    document.getElementById('title-input').value = '';
    document.getElementById('editor').value = '';
    autoResize(document.getElementById('title-input'));
  }
  showToast('削除しました');
}

function clearChat() {
  if (!confirm('チャット履歴を削除しますか？')) return;
  localStorage.removeItem('note_chat_log_' + (currentDraftId || 'default'));
  localStorage.removeItem('note_chat_memo_' + (currentDraftId || 'default'));
  chatMemo = { text: '', upTo: 0 };
  clearChatUI();
  showToast('チャット履歴を削除しました');
}

function clearChatUI() {
  chatLog = [];
  const messages = document.getElementById('chat-messages');
  messages.innerHTML = `<div class="chat-empty" id="chat-empty">
    <div>AIと壁打ちしながら記事を育てよう</div>
    <div class="examples">
      <button class="example-chip" onclick="useExample(this)">今日考えていたことを話すから、記事にまとめてほしい</button>
      <button class="example-chip" onclick="useExample(this)">この話、面白いと思う？どう膨らませる？</button>
      <button class="example-chip" onclick="useExample(this)">もっとカジュアルな文体にして</button>
      <button class="example-chip" onclick="useExample(this)">読者に刺さる導入に書き直して</button>
      <button class="example-chip" onclick="useExample(this)">結論をもっと強く打ち出して</button>
    </div>
  </div>`;
}

function newDraft() {
  currentDraftId = null;
  localStorage.removeItem('note_current_draft_id');
  document.getElementById('title-input').value = '';
  document.getElementById('editor').value = '';
  autoResize(document.getElementById('title-input'));
  clearChatUI(); // 新規下書き = チャットもリセット
  chatMemo = { text: '', upTo: 0 };
  closeDrafts();
  document.getElementById('editor').focus();
}

function branchDraft() {
  // チャット履歴を引き継いで新規下書きを作成
  const inheritedLog = [...chatLog];
  currentDraftId = null;
  localStorage.removeItem('note_current_draft_id');
  document.getElementById('title-input').value = '';
  document.getElementById('editor').value = '';
  autoResize(document.getElementById('title-input'));
  // チャットはそのまま引き継ぎ（chatLogは変えない）
  closeDrafts();
  document.getElementById('editor').focus();
  showToast('⑂ チャットを引き継いで新規下書きを作成しました');
}

function renderDraftsList(query) {
  const q = (query || '').trim().toLowerCase();
  const drafts = getDrafts().filter(d => !q || d.title.toLowerCase().includes(q) || d.body.toLowerCase().includes(q));
  const list = document.getElementById('drafts-list');
  if (!drafts.length) { list.innerHTML = `<div class="drafts-empty">${q ? '一致する下書きがありません' : '保存された下書きはありません'}</div>`; return; }
  list.innerHTML = drafts.map(d => {
    const date = new Date(d.updated).toLocaleDateString('ja-JP', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    return `
      <div class="draft-item ${d.id === currentDraftId ? 'current' : ''}" onclick="loadDraft('${d.id}')">
        <div class="draft-title">${esc(d.title)}</div>
        <div class="draft-preview">${esc(d.body.trim().replace(/\n/g,' ').substring(0,60)) || '（本文なし）'}</div>
        <div class="draft-meta">
          <span>${date}</span>
          <div class="draft-btns">
            <button class="draft-btn" onclick="downloadDraft('${d.id}',event)">↓DL</button>
            <button class="draft-btn del" onclick="deleteDraft('${d.id}',event)">削除</button>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function downloadDraft(id, e) {
  e.stopPropagation();
  const d = getDrafts().find(x => x.id === id);
  if (d) triggerDownload(`# ${d.title}\n\n${d.body}`, d.title, 'md');
}

function copyAll() {
  // タイトルは別フィールドのため本文のみコピー（本文はMarkdown）
  const body = document.getElementById('editor').value;
  if (!body.trim()) { showToast('本文がありません'); return; }
  copyText(body, '📋 本文をMarkdownでコピーしました');
}

function copyChatMd() {
  // 壁打ち（会話モード）のみを対談形式のMarkdownにする（編集指示・エラー通知は除外）
  const log = chatLog.filter(m => (m.mode ?? 'chat') === 'chat');
  if (!log.length) { showToast('チャット履歴がありません'); return; }
  const md = log.map(m => `**${m.role === 'ai' ? 'AI' : '自分'}**：${m.text}`).join('\n\n');
  copyText(md, '📋 チャットをMarkdownでコピーしました');
}

// クリップボードコピー（クリップボードAPI不可の環境ではexecCommandにフォールバック）
function copyText(text, toastMsg) {
  const done = () => showToast(toastMsg);
  if (navigator.clipboard?.writeText) {
    navigator.clipboard.writeText(text).then(done).catch(() => { fallbackCopy(text); done(); });
  } else {
    fallbackCopy(text);
    done();
  }
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  ta.remove();
}

function triggerDownload(content, name, ext) {
  const type = ext === 'md' ? 'text/markdown;charset=utf-8' : 'text/plain;charset=utf-8';
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(new Blob([content], { type })),
    download: (name.replace(/[/\\?%*:|"<>]/g, '_') || 'draft') + '.' + ext
  });
  a.click(); URL.revokeObjectURL(a.href);
}

function openDrafts() {
  const si = document.getElementById('drafts-search-input');
  if (si) si.value = '';
  renderDraftsList();
  document.getElementById('drafts-overlay').classList.add('visible');
  document.getElementById('drafts-panel').classList.add('open');
}
function closeDrafts() { document.getElementById('drafts-overlay').classList.remove('visible'); document.getElementById('drafts-panel').classList.remove('open'); }

// ==================== Gist Sync ====================
// アプリを閉じる・他アプリに切り替えた時、未同期の変更があれば自動で☁️保存（ベストエフォート）
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden' && gistDirty && githubPAT && gistId) {
    gistUpload(true);
  }
});

function showGistModal() {
  if (document.querySelector('.modal-overlay')) return;
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <h2>☁️ Gist同期設定</h2>
      <p>GitHub Personal Access Token（gistスコープ）を設定します。Gist IDは初回アップロード時に自動作成されます。</p>
      <div class="modal-input-row">
        <input type="password" id="modal-pat" placeholder="GitHub Personal Access Token" autocomplete="off" />
        <button class="modal-copy-btn" onclick="copyGistField('modal-pat', 'PAT')" title="コピー">📋</button>
      </div>
      <div class="modal-input-row">
        <input type="text" id="modal-gist-id" placeholder="Gist ID（初回アップロード後に自動設定）" autocomplete="off" />
        <button class="modal-copy-btn" onclick="copyGistField('modal-gist-id', 'Gist ID')" title="コピー">📋</button>
      </div>
      <button class="modal-btn" id="gist-modal-save">保存</button>
    </div>
  `;
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);
  document.getElementById('modal-pat').value = githubPAT;
  document.getElementById('modal-gist-id').value = gistId;
  document.getElementById('gist-modal-save').addEventListener('click', saveGistSettings);
}

function copyGistField(id, label) {
  const v = document.getElementById(id)?.value.trim();
  if (!v) { showToast(label + 'はまだ設定されていません'); return; }
  copyText(v, '📋 ' + label + 'をコピーしました');
}

function saveGistSettings() {
  githubPAT = document.getElementById('modal-pat')?.value.trim() ?? '';
  gistId    = document.getElementById('modal-gist-id')?.value.trim() ?? '';
  localStorage.setItem('note_github_pat', githubPAT);
  localStorage.setItem('note_gist_id',    gistId);
  updateGistBtn();
  document.querySelector('.modal-overlay')?.remove();
  showToast('Gist設定を保存しました');
}

function updateGistBtn() {
  const btn = document.getElementById('gist-btn');
  if (!btn) return;
  const ok = !!(githubPAT && gistId);
  btn.style.color = ok ? '#52c41a' : '#333';
}

function collectAllChatLogs() {
  saveChatLog();
  const logs = {};
  getDrafts().forEach(d => {
    const raw = localStorage.getItem('note_chat_log_' + d.id);
    if (raw) { try { logs[d.id] = JSON.parse(raw); } catch {} }
  });
  return logs;
}

function collectAllChatMemos() {
  saveChatMemo();
  const memos = {};
  getDrafts().forEach(d => {
    const raw = localStorage.getItem('note_chat_memo_' + d.id);
    if (raw) { try { memos[d.id] = JSON.parse(raw); } catch {} }
  });
  return memos;
}

async function gistUpload(silent = false) {
  if (!githubPAT) { if (!silent) { showToast('GitHubトークンを設定してください'); showGistModal(); } return; }
  const payload = JSON.stringify({
    version: 2,
    syncedAt: new Date().toISOString(),
    drafts: getDrafts(),
    chatLogs: collectAllChatLogs(),
    chatMemos: collectAllChatMemos(),
    styleMemo: localStorage.getItem('note_style_memo') || '',
    tone: localStorage.getItem('note_tone') || ''
  }, null, 2);
  const reqBody = { description: 'Ohire drafts', public: false, files: { 'ohire-drafts.json': { content: payload } } };
  const headers = { 'Authorization': `Bearer ${githubPAT}`, 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json', 'X-GitHub-Api-Version': '2022-11-28' };
  try {
    if (!silent) showToast('アップロード中…');
    const res = await fetch(
      gistId ? `https://api.github.com/gists/${gistId}` : 'https://api.github.com/gists',
      { method: gistId ? 'PATCH' : 'POST', headers, body: JSON.stringify(reqBody) }
    );
    if (!res.ok) throw new Error(`GitHub API: ${res.status}`);
    const json = await res.json();
    if (!gistId) {
      gistId = json.id;
      localStorage.setItem('note_gist_id', gistId);
      updateGistBtn();
    }
    gistDirty = false;
    if (!silent) showToast('☁️ クラウドに保存しました');
  } catch (e) { if (!silent) showToast('エラー: ' + e.message); }
}

async function gistDownload() {
  if (!githubPAT) { showToast('GitHubトークンを設定してください'); showGistModal(); return; }
  if (!gistId)    { showToast('まずクラウドに保存してください'); return; }
  const headers = { 'Authorization': `Bearer ${githubPAT}`, 'Accept': 'application/vnd.github+json', 'X-GitHub-Api-Version': '2022-11-28' };
  try {
    showToast('ダウンロード中…');
    const res = await fetch(`https://api.github.com/gists/${gistId}`, { headers });
    if (!res.ok) throw new Error(`GitHub API: ${res.status}`);
    const json = await res.json();
    const raw = json.files['ohire-drafts.json']?.content;
    if (!raw) throw new Error('データが見つかりません');
    const data = JSON.parse(raw);

    // ローカルと簡易マージ（全置き換えをやめ、最後の☁️保存以降のローカル作業が消えないようにする）
    const localDrafts = getDrafts();
    const localById = {};
    localDrafts.forEach(d => { localById[d.id] = d; });
    const remoteDrafts = data.drafts || [];
    const remoteIds = new Set(remoteDrafts.map(d => d.id));
    const merged = remoteDrafts.map(rd => {
      const ld = localById[rd.id];
      if (!ld) return rd;
      // updatedが新しい方を正とする。夜間リライト案はGist側にあれば常に取り込む
      const base = (ld.updated || 0) > (rd.updated || 0) ? { ...ld } : { ...rd };
      if (rd.nightlyProposal) base.nightlyProposal = rd.nightlyProposal;
      return base;
    });
    // ローカルにしかない下書き（最後のアップロード後に作成）は残す
    localDrafts.forEach(ld => { if (!remoteIds.has(ld.id)) merged.push(ld); });
    merged.sort((a, b) => (b.updated || 0) - (a.updated || 0));
    saveDraftsToStorage(merged);
    Object.entries(data.chatLogs || {}).forEach(([id, log]) => {
      // メッセージ件数が多い方（＝進んでいる方）を採用
      let localLen = 0;
      try { localLen = (JSON.parse(localStorage.getItem('note_chat_log_' + id) || '[]') || []).length; } catch {}
      if ((log || []).length >= localLen) localStorage.setItem('note_chat_log_' + id, JSON.stringify(log));
    });
    Object.entries(data.chatMemos || {}).forEach(([id, memo]) => {
      // 畳み込み済み件数（upTo）が進んでいる方を採用
      let localUpTo = -1;
      try { localUpTo = (JSON.parse(localStorage.getItem('note_chat_memo_' + id) || 'null') || {}).upTo ?? -1; } catch {}
      if ((memo?.upTo ?? 0) >= localUpTo) localStorage.setItem('note_chat_memo_' + id, JSON.stringify(memo));
    });
    if (typeof data.styleMemo === 'string' && data.styleMemo) {
      localStorage.setItem('note_style_memo', data.styleMemo);
      document.getElementById('style-memo').value = data.styleMemo;
    }
    if (typeof data.tone === 'string' && data.tone) {
      localStorage.setItem('note_tone', data.tone);
      document.getElementById('tone-select').value = data.tone;
    }
    // 現在の下書きを再描画（マージ結果を正とする）
    const cur = merged.find(d => d.id === currentDraftId);
    if (cur) {
      document.getElementById('title-input').value = cur.title === '（無題）' ? '' : cur.title;
      document.getElementById('editor').value = cur.body;
      autoResize(document.getElementById('title-input'));
      autoResize(document.getElementById('editor'));
      clearChatUI();
      const savedLog = localStorage.getItem('note_chat_log_' + currentDraftId);
      if (savedLog) {
        try {
          chatLog = JSON.parse(savedLog);
          chatLog.forEach(m => restoreChatMessage(m));
          if (chatLog.length > 0) document.getElementById('chat-empty')?.remove();
        } catch {}
      }
      loadChatMemo(currentDraftId);
      maybeShowNightlyProposal(cur);
    }
    showToast('☁️ クラウドから読み込みました');
  } catch (e) { showToast('エラー: ' + e.message); }
}

// ==================== API Key ====================
function showApiKeyModal() {
  if (document.querySelector('.modal-overlay')) return;
  const provider = getSelectedProvider();
  if (provider === 'builtin') { showToast('ブラウザ内蔵AIはキー不要です'); return; }
  const info = PROVIDERS[provider];
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <h2>${info.name} APIキーを設定</h2>
      <p>APIキーはブラウザのlocalStorageにのみ保存されます。外部サーバーには送信されません。</p>
      <p>取得先: <a href="${info.keyUrl}" target="_blank" rel="noopener">${info.keyUrl}</a><br>${info.keyNote}</p>
      <input type="password" id="modal-key" placeholder="${info.placeholder}" autocomplete="off" />
      <button class="modal-btn" id="modal-save">保存</button>
    </div>
  `;
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);
  const input = document.getElementById('modal-key');
  input.value = apiKeys[provider]; input.focus();
  input.addEventListener('keydown', e => { if (e.key === 'Enter') saveApiKey(); });
  document.getElementById('modal-save').addEventListener('click', saveApiKey);
}

function saveApiKey() {
  const val = document.getElementById('modal-key')?.value.trim() ?? '';
  if (!val) return;
  const provider = getSelectedProvider();
  apiKeys[provider] = val;
  localStorage.setItem('note_apikey_' + provider, val);
  updateApiKeyBtn();
  document.querySelector('.modal-overlay')?.remove();
  showToast('APIキーを保存しました');
}

function updateApiKeyBtn() {
  const provider = getSelectedProvider();
  const btn = document.getElementById('api-key-btn');
  if (provider === 'builtin') {
    btn.style.borderColor = '#52c41a';
    btn.title = 'このプロバイダーはキー不要';
    return;
  }
  const hasKey = !!apiKeys[provider];
  btn.style.borderColor = hasKey ? '#52c41a' : '#e0e0e0';
  btn.title = hasKey ? 'APIキー設定済み（クリックで変更）' : 'APIキーを設定';
}

// ==================== Helpers ====================
function autoResize(el) { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; }

let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}
