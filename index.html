<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ohire</title>
  <meta name="description" content="AIと壁打ちしながら記事を書ける執筆アプリ">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <meta name="apple-mobile-web-app-title" content="Ohire">
  <meta property="og:title" content="Ohire">
  <meta property="og:description" content="AIと壁打ちしながら記事を書ける執筆アプリ">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://kyunkyunpeachdisco-maker.github.io/ohire/">
  <meta property="og:image" content="https://kyunkyunpeachdisco-maker.github.io/ohire/og-image.png">
  <meta name="twitter:card" content="summary">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'メイリオ', 'Yu Gothic', sans-serif;
      background: #f5f5f5;
      color: #333;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    header {
      background: white;
      border-bottom: 1px solid #e8e8e8;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      z-index: 10;
    }

    .header-left { display: flex; align-items: center; gap: 10px; }
    header h1 { font-size: 15px; font-weight: 700; }

    .header-actions {
      display: flex;
      gap: 6px;
      align-items: center;
      margin-left: 16px;
    }

    /* Menu panel (slide-in from right) */
    #menu-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.3);
      z-index: 200; display: none;
    }
    #menu-overlay.visible { display: block; }

    #menu-panel {
      position: fixed; top: 0; right: -300px;
      width: 280px; max-width: 85vw; height: 100%;
      background: white; z-index: 201;
      box-shadow: -4px 0 24px rgba(0,0,0,0.12);
      display: flex; flex-direction: column;
      transition: right 0.25s ease;
    }
    #menu-panel.open { right: 0; }

    .menu-panel-header {
      padding: 14px 18px;
      border-bottom: 1px solid #f0f0f0;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .menu-panel-header h2 { font-size: 15px; font-weight: 700; }
    .menu-panel-close { background: none; border: none; font-size: 20px; cursor: pointer; color: #888; }

    .menu-panel-body {
      flex: 1; overflow-y: auto; padding: 8px 0;
      -webkit-overflow-scrolling: touch;
    }

    .dropdown-item {
      display: block;
      width: 100%;
      padding: 11px 16px;
      background: none;
      border: none;
      text-align: left;
      font-size: 14px;
      font-family: inherit;
      color: #333;
      cursor: pointer;
      white-space: nowrap;
    }
    .dropdown-item:hover { background: #f5f5f5; }
    .dropdown-item + .dropdown-item { border-top: 1px solid #f0f0f0; }
    .dropdown-item.danger { color: #e74c3c; }

    /* ハンバーガーメニュー内のselectラベル */
    .menu-label {
      padding: 8px 16px 2px;
      font-size: 10px;
      color: #aaa;
      font-weight: 600;
      letter-spacing: 0.05em;
    }
    .menu-select {
      display: block;
      width: calc(100% - 32px);
      margin: 0 16px 8px;
      padding: 7px 8px;
      border: 1px solid #e0e0e0;
      border-radius: 7px;
      font-size: 13px;
      font-family: inherit;
      background: white;
      color: #333;
    }
    .menu-divider { border: none; border-top: 1px solid #f0f0f0; margin: 4px 0; }

    .btn-sm {
      background: none;
      border: 1px solid #e0e0e0;
      border-radius: 7px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 12px;
      color: #666;
      display: flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
      font-family: inherit;
    }

    .btn-sm:hover { background: #f5f5f5; }
    .btn-sm.active { border-color: #52c41a; color: #52c41a; }

    /* Main layout */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Editor pane */
    .editor-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: white;
      overflow: hidden;
      border-right: 1px solid #e8e8e8;
    }

    .editor-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 32px 40px 120px;
    }

    #title-input {
      width: 100%;
      font-size: 26px;
      font-weight: 700;
      border: none;
      background: transparent;
      outline: none;
      color: #1a1a1a;
      margin-bottom: 16px;
      line-height: 1.35;
      resize: none;
      overflow: hidden;
      font-family: inherit;
    }

    #title-input::placeholder { color: #d0d0d0; }

    #editor {
      width: 100%;
      min-height: 400px;
      font-size: 16px;
      line-height: 1.85;
      border: none;
      background: transparent;
      outline: none;
      resize: none;
      color: #333;
      font-family: inherit;
    }

    #editor::placeholder { color: #ccc; }

    /* Inline diff view */
    #diff-view {
      display: none;
      flex: 1;
      overflow-y: auto;
      padding: 24px 40px 120px;
      font-size: 16px;
      line-height: 1.85;
      font-family: inherit;
      -webkit-overflow-scrolling: touch;
    }
    #diff-view.active { display: block; }

    .diff-unchanged { white-space: pre-wrap; color: #333; font-family: inherit; }

    .diff-changed-block {
      margin: 6px 0;
      border-radius: 6px;
      overflow: hidden;
      border: 1.5px solid #e0a020;
    }
    .diff-changed-block.accepted { border-color: #27ae60; }
    .diff-changed-block.rejected { border-color: #ccc; }

    .diff-block-actions {
      display: flex;
      gap: 6px;
      padding: 5px 10px;
      background: #fff9ed;
      border-bottom: 1px solid #f0e0a0;
    }
    .btn-accept-block {
      background: #1a1a1a; color: white;
      border: none; border-radius: 5px;
      padding: 3px 12px; font-size: 12px;
      cursor: pointer; font-family: inherit; font-weight: 600;
    }
    .btn-reject-block {
      background: white; color: #666;
      border: 1px solid #ddd; border-radius: 5px;
      padding: 3px 12px; font-size: 12px;
      cursor: pointer; font-family: inherit;
    }

    .retry-draft-btn {
      margin-top: 8px;
      background: white; color: #555;
      border: 1px solid #ddd; border-radius: 5px;
      padding: 3px 12px; font-size: 12px;
      cursor: pointer; font-family: inherit;
      display: inline-block;
    }

    .diff-del-line {
      display: block; white-space: pre-wrap; font-family: inherit;
      background: #fff0f0; color: #c0392b;
      text-decoration: line-through; padding: 1px 12px;
    }
    .diff-add-line {
      display: block; white-space: pre-wrap; font-family: inherit;
      background: #f0fff4; color: #1e8449; padding: 1px 12px;
    }

    /* 文字レベル差分: 共通部分は淡く、変更箇所(.cdh)を濃く */
    .diff-del-line.cd { text-decoration: none; color: #b59a9a; }
    .diff-add-line.cd { color: #8fa897; }
    .diff-del-line .cdh { background: #ffd9d9; color: #c0392b; text-decoration: line-through; font-weight: 600; border-radius: 2px; }
    .diff-add-line .cdh { background: #c9f0d4; color: #1e8449; font-weight: 600; border-radius: 2px; }
    .diff-changed-block.accepted .diff-add-line .cdh,
    .diff-changed-block.rejected .diff-del-line .cdh { background: none; color: inherit; font-weight: inherit; text-decoration: none; }

    .diff-changed-block.accepted .diff-del-line { display: none; }
    .diff-changed-block.accepted .diff-add-line { background: none; color: #333; }
    .diff-changed-block.rejected .diff-add-line { display: none; }
    .diff-changed-block.rejected .diff-del-line { text-decoration: none; background: none; color: #888; }

    /* Diff controls footer */
    #diff-controls {
      display: none;
      gap: 8px; padding: 10px 16px;
      background: white; border-top: 1px solid #e8e8e8;
      flex-shrink: 0; align-items: center; justify-content: space-between;
    }
    #diff-controls.active { display: flex; }
    .diff-controls-info { font-size: 12px; color: #888; }
    .diff-controls-btns { display: flex; gap: 6px; }

    .btn-reject {
      background: white; color: #666;
      border: 1px solid #ddd; border-radius: 7px;
      padding: 6px 14px; cursor: pointer;
      font-size: 13px; font-family: inherit;
    }
    .btn-accept {
      background: white; color: #1e8449;
      border: 1px solid #b7e0c0; border-radius: 7px;
      padding: 6px 14px; cursor: pointer;
      font-size: 13px; font-family: inherit;
    }

    .btn-confirm {
      background: #1a1a1a; color: white;
      border: none; border-radius: 7px;
      padding: 6px 16px; cursor: pointer;
      font-size: 13px; font-weight: 600; font-family: inherit;
    }

    .diff-changed-block { cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .diff-changed-block.accepted { border-color: #52c41a; }
    .diff-changed-block.rejected { border-color: #ccc; }

    /* Pane divider (resizable) */
    .pane-divider {
      width: 5px;
      flex-shrink: 0;
      background: #e8e8e8;
      cursor: col-resize;
      transition: background 0.15s;
      z-index: 10;
      position: relative;
    }
    /* タッチ判定を両側に広げる（見た目は変えない） */
    .pane-divider::after {
      content: '';
      position: absolute;
      top: 0; bottom: 0;
      left: -10px; right: -10px;
    }
    .pane-divider:hover, .pane-divider.dragging { background: #aaa; }

    /* Chat pane */
    .chat-pane {
      flex: 0 0 340px;
      min-width: 150px;
      display: flex;
      flex-direction: column;
      background: #fafafa;
      overflow: hidden;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .chat-empty {
      text-align: center;
      color: #bbb;
      font-size: 13px;
      margin: auto;
      padding: 20px;
      line-height: 1.8;
    }

    .chat-empty .examples {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 12px;
    }

    textarea.menu-select {
      resize: vertical;
      min-height: 64px;
      font-family: inherit;
      line-height: 1.5;
    }

    .example-chip {
      background: white;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 12px;
      color: #666;
      cursor: pointer;
      text-align: left;
      transition: all 0.15s;
      font-family: inherit;
    }

    .example-chip:hover { border-color: #ccc; background: #f9f9f9; }

    /* Message bubbles */
    .msg { display: flex; flex-direction: column; gap: 3px; }

    .msg-user { align-items: flex-end; }
    .msg-ai   { align-items: flex-start; }

    .bubble {
      max-width: 88%;
      padding: 9px 13px;
      border-radius: 14px;
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .bubble-user { background: #1a1a1a; color: white; border-bottom-right-radius: 4px; }
    .bubble-ai   { background: white; color: #333; border: 1px solid #e8e8e8; border-bottom-left-radius: 4px; }

    .msg-meta { font-size: 10px; color: #bbb; padding: 0 4px; }

    /* Typing indicator */
    .typing-dots { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
    .typing-dots span {
      width: 6px; height: 6px;
      background: #bbb;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

    /* Chat input */
    .chat-input-area {
      border-top: 1px solid #e8e8e8;
      background: white;
      padding: 10px 12px;
      flex-shrink: 0;
    }

    .chat-input-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      background: #f5f5f5;
      border-radius: 12px;
      padding: 8px 10px;
    }

    #chat-input {
      flex: 1;
      border: none;
      background: transparent;
      outline: none;
      font-size: 14px;
      color: #333;
      font-family: inherit;
      resize: none;
      min-height: 24px;
      max-height: 120px;
      line-height: 1.5;
    }

    #chat-input::placeholder { color: #bbb; }

    #chat-send {
      background: #1a1a1a;
      color: white;
      border: none;
      border-radius: 8px;
      width: 30px;
      height: 30px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    #chat-send:disabled { background: #ccc; cursor: not-allowed; }

    /* Image attachment */
    #image-preview-area {
      display: none;
      padding: 8px 10px 0;
    }
    #image-preview-area.visible { display: flex; align-items: flex-start; gap: 8px; }

    #image-preview-wrap {
      position: relative;
      display: inline-flex;
    }
    #image-preview-wrap img {
      max-height: 80px;
      max-width: 120px;
      border-radius: 8px;
      object-fit: cover;
      border: 1px solid #e0e0e0;
    }
    #image-remove {
      position: absolute;
      top: -6px; right: -6px;
      width: 18px; height: 18px;
      background: #666;
      color: white;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      font-size: 10px;
      display: flex; align-items: center; justify-content: center;
      line-height: 1;
    }

    #image-attach {
      background: none;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      width: 30px;
      height: 30px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
      color: #888;
    }
    #image-attach:hover { border-color: #ccc; background: #f5f5f5; }
    #image-attach.has-image { border-color: #52c41a; color: #52c41a; }

    #draft-gen { opacity: 0.35; transition: opacity 0.15s; }
    #draft-gen.on { opacity: 1; border-color: #1a1a1a; background: #f0f0f0; }
    #preview-btn.on { border-color: #1a1a1a; background: #f0f0f0; }

    #preview-view {
      display: none;
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 32px 40px 120px;
      background: white;
      line-height: 1.9;
      font-size: 16px;
      color: #222;
    }
    #preview-view h2 { font-size: 20px; margin: 28px 0 12px; }
    #preview-view h3 { font-size: 17px; margin: 22px 0 10px; }
    #preview-view p { margin: 0 0 14px; }
    #preview-view .pv-title { font-size: 24px; margin: 0 0 24px; font-weight: 700; }

    .bubble-img {
      max-width: 100%;
      max-height: 200px;
      border-radius: 10px;
      display: block;
      margin-bottom: 6px;
    }

    .chat-hint {
      font-size: 10px;
      color: #ccc;
      text-align: center;
      margin-top: 6px;
    }

    /* Spinner */
    .spinner {
      width: 12px; height: 12px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Save indicator */
    #save-indicator {
      font-size: 10px;
      color: #ccc;
      padding: 0 16px 8px;
      flex-shrink: 0;
    }

    /* Drafts drawer */
    #drafts-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.3);
      z-index: 400; display: none;
    }
    #drafts-overlay.visible { display: block; }

    #drafts-panel {
      position: fixed; top: 0; right: -360px;
      width: 340px; max-width: 90vw; height: 100%;
      background: white; z-index: 401;
      box-shadow: -4px 0 24px rgba(0,0,0,0.12);
      display: flex; flex-direction: column;
      transition: right 0.25s ease;
    }
    #drafts-panel.open { right: 0; }

    .drafts-header {
      padding: 16px 20px;
      border-bottom: 1px solid #f0f0f0;
      display: flex; align-items: center; justify-content: space-between;
    }
    .drafts-header h2 { font-size: 16px; font-weight: 700; }
    .drafts-close { background: none; border: none; font-size: 20px; cursor: pointer; color: #888; }

    .drafts-search {
      padding: 8px 16px;
      border-bottom: 1px solid #f0f0f0;
      flex-shrink: 0;
    }
    .drafts-search input {
      width: 100%;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      background: #f9f9f9;
    }
    .drafts-search input:focus { border-color: #aaa; background: white; }

    .drafts-body { flex: 1; overflow-y: auto; padding: 12px; }

    .draft-item {
      border: 1px solid #eee; border-radius: 10px;
      padding: 12px 14px; margin-bottom: 8px;
      cursor: pointer; transition: all 0.15s;
    }
    .draft-item:hover { border-color: #ccc; }
    .draft-item.current { border-color: #1a1a1a; }

    .draft-title { font-size: 14px; font-weight: 600; margin-bottom: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .draft-preview { font-size: 12px; color: #888; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; margin-bottom: 8px; }
    .draft-meta { font-size: 11px; color: #bbb; display: flex; justify-content: space-between; align-items: center; }

    .draft-btns { display: flex; gap: 4px; }
    .draft-btn { background: none; border: 1px solid #e8e8e8; border-radius: 5px; padding: 3px 8px; font-size: 11px; cursor: pointer; color: #666; font-family: inherit; }
    .draft-btn.del { color: #e74c3c; border-color: #fce; }

    .drafts-footer { display: flex; gap: 8px; margin: 12px; }
    .drafts-new { flex: 1; padding: 10px; background: #1a1a1a; color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 600; font-family: inherit; }
    .drafts-branch { flex: 1; padding: 10px; background: white; color: #1a1a1a; border: 1.5px solid #1a1a1a; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 600; font-family: inherit; }

    .drafts-empty { text-align: center; color: #bbb; padding: 40px 20px; font-size: 13px; }

    /* API key modal */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 600; display: flex;
      align-items: center; justify-content: center;
      padding: 20px; backdrop-filter: blur(4px);
    }
    .modal { background: white; border-radius: 20px; padding: 28px; width: 100%; max-width: 400px; }
    .modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
    .modal p { font-size: 13px; color: #888; margin-bottom: 20px; line-height: 1.6; }
    .modal input { width: 100%; border: 1.5px solid #e0e0e0; border-radius: 10px; padding: 12px 14px; font-size: 14px; outline: none; margin-bottom: 14px; font-family: monospace; }
    .modal input:focus { border-color: #1a1a1a; }
    .modal-input-row { display: flex; gap: 6px; align-items: flex-start; }
    .modal-input-row input { flex: 1; }
    .modal-copy-btn {
      flex-shrink: 0;
      background: white; border: 1.5px solid #e0e0e0; border-radius: 10px;
      padding: 12px 13px; font-size: 14px; cursor: pointer; font-family: inherit;
    }
    .modal-btn { width: 100%; background: #1a1a1a; color: white; border: none; border-radius: 10px; padding: 13px; font-size: 15px; cursor: pointer; font-weight: 600; font-family: inherit; }

    .tutorial-modal { max-height: 85dvh; overflow-y: auto; -webkit-overflow-scrolling: touch; text-align: left; }
    .tutorial-modal p { font-size: 13px; line-height: 1.7; color: #444; margin-bottom: 12px; }
    .tutorial-step { font-size: 13px; line-height: 1.7; color: #444; margin-bottom: 12px; }
    .tutorial-step ul { margin: 6px 0 0 18px; padding: 0; }
    .tutorial-step li { margin-bottom: 6px; }
    .tutorial-note { font-size: 12px; color: #888; }

    /* Toast */
    #toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1a1a1a; color: white;
      padding: 10px 20px; border-radius: 20px;
      font-size: 13px; opacity: 0; transition: all 0.3s;
      pointer-events: none; z-index: 500; white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* AI selects */
    .ai-select {
      border: 1px solid #e0e0e0;
      border-radius: 7px;
      padding: 6px 8px;
      font-size: 12px;
      color: #666;
      background: white;
      cursor: pointer;
      font-family: inherit;
      outline: none;
    }
    .ai-select:hover { border-color: #ccc; }

    /* Pane label (mobile only) */
    .pane-label { display: none; }

    /* エディタ更新バッジ */
    .editor-badge {
      display: inline-block;
      background: #1a1a1a;
      color: white;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 10px;
      margin-left: 6px;
      animation: badgePop 0.2s ease;
    }
    @keyframes badgePop { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    #deep-rewrite-progress {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      background: #1a1a1a;
      color: #fff;
      font-size: 13px;
      border-bottom: 1px solid #333;
    }
    #deep-rewrite-progress.active { display: flex; }
    #deep-rewrite-progress .progress-steps { display: flex; gap: 6px; }
    #deep-rewrite-progress .step {
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      background: #333;
      color: #888;
    }
    #deep-rewrite-progress .step.done { background: #2a6; color: #fff; }
    #deep-rewrite-progress .step.active { background: #555; color: #fff; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }

    /* Desktop: editor fills available vertical space */
    @media (min-width: 681px) {
      #editor { min-height: calc(100dvh - 280px); }
    }

    /* Mobile layout */
    @media (max-width: 680px) {
      .pane-label {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 5px 12px;
        background: #f0f0f0;
        border-bottom: 1px solid #e8e8e8;
        font-size: 12px;
        font-weight: 600;
        color: #888;
        flex-shrink: 0;
        cursor: pointer;
        user-select: none;
        -webkit-user-select: none;
      }

      /* 最小化時 (!important でインラインstyleを上書き) */
      .editor-pane.collapsed { flex: 0 0 auto !important; }
      .editor-pane.collapsed .editor-scroll,
      .editor-pane.collapsed #save-indicator,
      .editor-pane.collapsed #diff-view,
      .editor-pane.collapsed #diff-controls { display: none; }

      .chat-pane.collapsed { flex: 0 0 auto !important; }
      .chat-pane.collapsed .chat-messages { display: none; }

      /* 縦分割: エディタ上・チャット下 */
      .main { flex-direction: column; }
      .editor-pane {
        position: static;
        display: flex;
        flex: 3;
        min-height: 60px;
        border-right: none;
        border-bottom: 1px solid #e8e8e8;
      }
      .chat-pane {
        position: static;
        display: flex;
        width: 100%;
        flex: 2;
        min-height: 60px;
      }

      /* モバイル用 divider */
      .pane-divider {
        width: 100%;
        height: 5px;
        cursor: row-resize;
      }
      .pane-divider::after {
        left: 0; right: 0;
        top: -10px; bottom: -10px;
      }

      .editor-scroll { padding: 16px 16px 16px; }
      #preview-view { padding: 16px 16px 90px; }
      #title-input { font-size: 22px; }
      .btn-sm span { display: none; }
      /* モバイルはCtrlキーがないため送信ヒント不要 */
      .chat-hint { display: none; }
      /* iOSズーム防止: input/textareaは16px以上必須 */
      input, textarea, select { font-size: 16px !important; }

      /* iOS standalone モード対策: position:fixed で overflow:hidden の外に出す */
      .chat-input-area {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 50;
        padding-bottom: calc(10px + env(safe-area-inset-bottom));
      }
      .chat-messages { padding-bottom: 90px; }

      #chat-input {
        -webkit-user-select: text;
        user-select: text;
      }
    }
  </style>
</head>

<script>
// ==================== localStorageキー移行（note_* → ohire-*、一度きり） ====================
(function(){
  try {
    if (localStorage.getItem('ohire-key-migrated')) return;
    const olds = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.indexOf('note_') === 0) olds.push(k);
    }
    olds.forEach(k => {
      const nk = 'ohire-' + k.slice(5);
      if (localStorage.getItem(nk) === null) localStorage.setItem(nk, localStorage.getItem(k));
      localStorage.removeItem(k);
    });
    localStorage.setItem('ohire-key-migrated', '1');
  } catch (e) { /* プライベートモード等では何もしない */ }
})();

// ==================== Providers ====================
const PROVIDERS = {
  anthropic: {

      { value: 'claude-fable-5',    label: 'Fable（最上位）' },
    ]
  },
  openai: {
    name: 'GPT (OpenAI)',
    placeholder: 'sk-...',
    keyUrl: 'https://platform.openai.com/api-keys',
    keyNote: '従量課金（無料枠なし）',
    models: [
      { value: 'gpt-5.4-mini', label: 'GPT-5.4 mini（速・安）' },

    ]
  },
  groq: {

      { value: 'llama-3.1-8b-instant',    label: 'Llama 3.1 8B（速）' },
      { value: 'llama-3.3-70b-versatile', label: 'Llama 3.3 70B（標準）' },
      { value: 'openai/gpt-oss-120b',     label: 'GPT-OSS 120B（高性能）' },
    ]
  },
  gemini: {
    name: 'Gemini (Google)',
    placeholder: 'AIza...',
    keyUrl: 'https://aistudio.google.com/apikey',
    keyNote: '無料枠あり（カード登録不要・Flash系は1日1,500回）',
    models: [
      { value: 'gemini-2.5-flash-lite', label: 'Gemini 2.5 Flash-Lite（速・安）' },
      { value: 'gemini-3.5-flash',      label: 'Gemini 3.5 Flash（標準）' },
    ]
  },
  builtin: {
    name: 'ブラウザ内蔵AI',
    placeholder: '',
    keyUrl: '',
    keyNote: 'キー不要・無料（デスクトップ版Chrome 148以降）',
    models: [
      { value: 'gemini-nano', label: 'Gemini Nano（オンデバイス・無料）' },
    ]
  },
};

// ==================== State ====================
const apiKeys = {
  anthropic: localStorage.getItem('ohire-apikey_anthropic') || '',
  openai:    localStorage.getItem('ohire-apikey_openai') || '',
  groq:      localStorage.getItem('ohire-apikey_groq') || '',
  gemini:    localStorage.getItem('ohire-apikey_gemini') || '',
};
let githubPAT = localStorage.getItem('ohire-github_pat') || '';
let dataRepo  = localStorage.getItem('ohire-data_repo')  || ''; // 同期先リポジトリ「owner/repo」
let repoDirty = false; // 最後の☁️保存以降にローカル変更があるか
let selStart = 0, selEnd = 0;
let proposedText = '';
let currentDraftId = localStorage.getItem('ohire-current_draft_id') || null;
let attachedImage = null; // { dataUrl, base64, mimeType }
let draftGenOn = false;
let pendingProposal = null; // 本文編集中に届いたライターAI提案の保留分（エディタblur時に表示）
// 議論メモ（古い会話のコンパクション結果）。upToはchatLogのうち畳み込み済みの件数
let chatMemo = { text: '', upTo: 0 };
let compacting = false;

function toggleDraftGen() {
  draftGenOn = !draftGenOn;
  document.getElementById('draft-gen').classList.toggle('on', draftGenOn);
  localStorage.setItem('ohire-draft_gen', draftGenOn ? '1' : '');
}

// チャット履歴（{role, text, time, mode}の配列。mode: 'chat'=会話 / 'edit'=編集 / 'system'=UI通知）
let chatLog = [];

// ==================== Init ====================
document.addEventListener('DOMContentLoaded', () => {
  // プロバイダー・モデルを復元
  const savedProvider = localStorage.getItem('ohire-provider') || 'anthropic';
  document.getElementById('provider-select').value = savedProvider;
  switchProvider(false);
  const savedModel = localStorage.getItem('ohire-model_' + savedProvider);
  if (savedModel) document.getElementById('model-select').value = savedModel;

  document.getElementById('model-select').addEventListener('change', e => {
    const provider = document.getElementById('provider-select').value;
    localStorage.setItem('ohire-model_' + provider, e.target.value);
  });

  // トーン設定を復元
  const savedTone = localStorage.getItem('ohire-tone') || '';
  document.getElementById('tone-select').value = savedTone;

  updateApiKeyBtn();

  // 下書きを復元
  if (currentDraftId) {
    const draft = getDrafts().find(d => d.id === currentDraftId);
    if (draft) {
      document.getElementById('title-input').value = draft.title === '（無題）' ? '' : draft.title;
      document.getElementById('editor').value = draft.body;
      maybeShowNightlyProposal(draft);
    }
  }

  // チャット履歴を復元
  const savedLog = localStorage.getItem('ohire-chat_log_' + (currentDraftId || 'default'));
  if (savedLog) {
    try {
      chatLog = JSON.parse(savedLog);
      chatLog.forEach(m => restoreChatMessage(m));
      if (chatLog.length > 0) document.getElementById('chat-empty')?.remove();
    } catch {}
  }

  loadChatMemo(currentDraftId);
  document.getElementById('style-memo').value = localStorage.getItem('ohire-style_memo') || '';
  draftGenOn = !!localStorage.getItem('ohire-draft_gen');
  document.getElementById('draft-gen').classList.toggle('on', draftGenOn);

  // 初回訪問者（キー未設定・下書きも会話もなし）にはチュートリアルを表示
  if (!localStorage.getItem('ohire-tutorial_seen')
      && !Object.values(apiKeys).some(Boolean)
      && getDrafts().length === 0 && chatLog.length === 0) {
    showTutorial();
  }

  autoResize(document.getElementById('title-input'));
  autoResize(document.getElementById('editor'));
  autoResize(document.getElementById('chat-input'));
  setIndicator('保存済み');
  restorePaneRatio();
  updateRepoBtn();

  // 長期間未使用時にブラウザがローカルデータを消すのを防ぐよう要求（対応ブラウザのみ・拒否されても害なし）
  navigator.storage?.persist?.().catch(() => {});

  // iOS: キーボード表示時に position:fixed の chat-input-area が埋もれる問題を visualViewport で対処
  if (window.visualViewport && isMobile()) {
    const chatInputArea = document.querySelector('.chat-input-area');
    function onViewportChange() {
      const vv = window.visualViewport;
      const offset = window.innerHeight - vv.offsetTop - vv.height;
      if (offset > 10) {
        // キーボード表示中: layout viewport の底から押し上げる
        chatInputArea.style.bottom = offset + 'px';
        const msgs = document.getElementById('chat-messages');
        msgs.scrollTop = msgs.scrollHeight;
      } else {
        // キーボード非表示: CSS 側の bottom に戻す
        chatInputArea.style.bottom = '';
      }
    }
    window.visualViewport.addEventListener('resize', onViewportChange);
    window.visualViewport.addEventListener('scroll', onViewportChange);
  }
});

// ==================== Pane resizer ====================
function isMobile() { return window.innerWidth <= 680; }

function applyPaneRatio(ratio) {
  const editorPane = document.getElementById('editor-pane');
  const chatPane   = document.getElementById('chat-pane');
  if (editorPane.classList.contains('collapsed') || chatPane.classList.contains('collapsed')) return;
  ratio = Math.max(0.12, Math.min(0.88, ratio));
  localStorage.setItem(isMobile() ? 'pane_ratio_mobile' : 'pane_ratio_desktop', ratio);
  if (isMobile()) {
    editorPane.style.flex = `0 0 ${ratio * 100}%`;
    chatPane.style.flex   = `0 0 ${(1 - ratio) * 100}%`;
  } else {
    editorPane.style.flex = '1 1 0';
    chatPane.style.flex   = `0 0 ${(1 - ratio) * 100}%`;
  }
}

function restorePaneRatio() {
  const saved = parseFloat(localStorage.getItem(isMobile() ? 'pane_ratio_mobile' : 'pane_ratio_desktop'));
  if (!isNaN(saved)) applyPaneRatio(saved);
}

function clearPaneInlineFlex() {
  document.getElementById('editor-pane').style.flex = '';
  document.getElementById('chat-pane').style.flex   = '';
}

(function() {
  const divider = document.getElementById('pane-divider');
  let dragging = false, startPos = 0, startEditorSize = 0, startChatSize = 0;

  divider.addEventListener('pointerdown', e => {
    if (e.button && e.button !== 0) return;
    dragging = true;
    divider.setPointerCapture(e.pointerId);
    divider.classList.add('dragging');
    const mobile = isMobile();
    startPos = mobile ? e.clientY : e.clientX;
    const ep = document.getElementById('editor-pane');
    const cp = document.getElementById('chat-pane');
    startEditorSize = mobile ? ep.offsetHeight : ep.offsetWidth;
    startChatSize   = mobile ? cp.offsetHeight : cp.offsetWidth;
    e.preventDefault();
  });

  divider.addEventListener('pointermove', e => {
    if (!dragging) return;
    const mobile = isMobile();
    const delta = (mobile ? e.clientY : e.clientX) - startPos;
    const newEditor = Math.max(60, startEditorSize + delta);
    const newChat   = Math.max(60, startChatSize   - delta);
    applyPaneRatio(newEditor / (newEditor + newChat));
  });

  const stopDrag = () => { dragging = false; divider.classList.remove('dragging'); };
  divider.addEventListener('pointerup', stopDrag);
  divider.addEventListener('pointercancel', stopDrag);

  window.addEventListener('resize', restorePaneRatio);
})();

// ==================== Pane toggle (mobile) ====================
function togglePane(pane) {
  if (window.innerWidth > 680) return;

  const el    = document.getElementById(pane + '-pane');
  const other = document.getElementById((pane === 'editor' ? 'chat' : 'editor') + '-pane');
  const isCollapsing = !el.classList.contains('collapsed');

  // インラインflexをクリアしてからCSSクラスに制御を渡す
  el.style.flex    = '';
  other.style.flex = '';
  el.classList.toggle('collapsed');

  if (pane === 'chat') {
    document.querySelector('.chat-input-area').style.display = isCollapsing ? 'none' : '';
    document.getElementById('chat-toggle-icon').textContent = isCollapsing ? '▶' : '▼';
  } else {
    document.getElementById('editor-toggle-icon').textContent = isCollapsing ? '▶' : '▲';
  }

  // 展開時かつ両ペイン可視の場合、保存済み比率を復元
  if (!isCollapsing && !other.classList.contains('collapsed')) {
    restorePaneRatio();

  reader.onload = e => {

    attachedImage = { dataUrl, base64, mimeType: file.type };

// クリップボードからの貼り付け
document.addEventListener('paste', e => {
  const items = e.clipboardData?.items;
  if (!items) return;
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      e.preventDefault();
      loadImageFile(item.getAsFile());
      break;
    }
  }
});

// 未圧縮の会話が溜まったら、古い分を議論メモに畳み込む（Claude Codeのコンパクション相当）
async function maybeCompactChat() {
  if (compacting) return;
  const pending = chatLog.slice(chatMemo.upTo).filter(m => (m.mode ?? 'chat') === 'chat');
  const pendingChars = pending.reduce((n, m) => n + m.text.length, 0);
  if (pendingChars < 8000) return;
  // 直近2往復は生のまま残し、それより前をメモへ
  const keep = 4;
  if (pending.length <= keep) return;
  const newUpTo = chatLog.indexOf(pending[pending.length - keep]);
  const toFold = chatLog.slice(chatMemo.upTo, newUpTo).filter(m => (m.mode ?? 'chat') === 'chat');
  if (!toFold.length) return;
  const lines = toFold.map(m => `${m.role === 'ai' ? 'AI' : 'ユーザー'}: ${m.text}`).join('\n');
  const prompt = `あなたは議論の記録係です。「既存メモ」に「新しいやり取り」の内容を統合し、更新後のメモ全文のみを返してください。

形式（この見出し構成を維持）:
## テーマと現在の方向性
## 決定事項（理由つき）
## ボツにした案と理由
## 未解決の論点

簡潔に。ただし後から議論を再開できる程度の具体性は残すこと。

既存メモ:
${chatMemo.text || '（まだなし）'}

新しいやり取り:
${lines}`;
  compacting = true;
  try {
    const memoText = await singleShotComplete(prompt);
    if (memoText) {
      chatMemo = { text: memoText, upTo: newUpTo };
      saveChatMemo();
    }
  } catch {
    // 失敗しても次のターンで再試行される
  } finally {
    compacting = false;
  }
}

async function sendChat() {
  const provider = getSelectedProvider();
  if (provider !== 'builtin' && !apiKeys[provider]) { showApiKeyModal(); return; }

  const input = document.getElementById('chat-input');
  const instruction = input.value.trim();
  if (!instruction) return;

  // 画像非対応プロバイダーは入力欄を消す前に弾く（書いた文章を失わせない）
  if (attachedImage && (provider === 'groq' || provider === 'builtin')) {
    showToast('このプロバイダーは画像非対応です。Claude・GPT・Geminiを使ってください');
    return;
  }

  const editor = document.getElementById('editor');
  // selStart/selEnd はエディタblur時に保存済みの値を使う（チャット欄タップで選択解除される問題の回避）
  const hasSelection = selStart !== selEnd;
  const savedSelStart = selStart, savedSelEnd = selEnd;
  selStart = 0; selEnd = 0; // 送信後リセット

  const targetText = hasSelection
    ? editor.value.substring(savedSelStart, savedSelEnd)
    : editor.value;
  const isEditMode = hasSelection; // 選択テキストがある時のみ編集モード（選択なし=会話モード）

  input.value = '';
  autoResize(input);

  document.getElementById('chat-empty')?.remove();

  const btn = document.getElementById('chat-send');
  btn.innerHTML = '<span class="spinner"></span>';
  btn.disabled = true;

  const prompt = isEditMode
    ? `以下のテキストを指示に従って編集してください。必ず下記のJSON形式のみで返してください（前置き・説明不要）。
{"reply":"会話としての返答（なぜそう編集したか、別案など、1〜3文）","edit":"編集後のテキスト全文"}
表を作る場合はMarkdownの表ではなく、note用KaTeX形式（$$\\begin{array}{l|l} \\text{見出し} & \\text{見出し} \\\\ \\hline \\text{セル} & \\text{セル} \\end{array}$$、日本語セルは\\text{}で包む）を使うこと。

指示: ${instruction}
${getStyleMemo() ? `\n執筆方針（常に守る）:\n${getStyleMemo()}\n` : ''}
テキスト:
${targetText}`
    : instruction;

  // 会話モード用システムプロンプト（全プロバイダー共通）
  // 話し相手AIは純粋な議論相手。下書き生成は別のAIコールが担当する。
  const systemPrompt = isEditMode ? null : `あなたはユーザーの議論相手です。テーマについて一緒に考え、意見を述べ、問いを投げ返してください。

あなたは記事を書きません。執筆・文体・構成は別のライターAIが担当しており、あなたの仕事は議論だけです。

ルール:
- 執筆に関する質問・提案（「どんなスタイルで書きますか？」「構成はどうしましょう？」など）は一切しない
- 「どんな記事を書きたいですか？」「目的は？」「方向性は？」のような確認質問は禁止。ユーザーが話し始めたら、そのまま議論に入る
- 事実関係や詳細の確認（「それは〇〇のこと？」など）は積極的にしてよい
- 自分の意見・反論・別の視点を遠慮なく出す。同意するだけの相槌は不要
- 話の矛盾や面白い点があれば突っ込む
- 返答は簡潔に（1〜3文）

参考情報として、議論を元に育っている下書きの現状を渡す。ユーザーが「あの段落」「さっきの結論」のように下書きに言及したら噛み合わせること。内容への意見はよいが、文面の執筆・修正の提案はしない。
${attachedImage ? `
画像が添付されている。あなたが画像を見られるのはこの1回だけで、以後の議論とライターAIの執筆は会話テキストだけが頼りになる。画像から読み取った内容・特徴を、返答の中で具体的に言語化して織り込むこと。
` : ''}
これまでの議論の要約メモ（古い会話分）:
${chatMemo.text || '（なし）'}

下書きの現状:
${draftContextForChat() || '（まだ下書きなし）'}`;

  // ユーザーメッセージに画像を含める（先に追加してからtypingを出す）
  const imgSnapshot = attachedImage;
  addMessage('user-img', instruction, imgSnapshot?.dataUrl ?? null, isEditMode ? 'edit' : 'chat');
  if (imgSnapshot) removeImage();
  const typingId = addTyping();

  // 会話履歴を構築（会話モードのやり取りのみ・直近8000字。送信済みの今回分は除外）
  const pastLog = chatLog.slice(0, -1).filter(m => (m.mode ?? 'chat') === 'chat');
  const historyLog = [];
  let histTotal = 0;
  for (let i = pastLog.length - 1; i >= 0; i--) {
    histTotal += pastLog[i].text.length;
    if (histTotal > 8000) break;
    historyLog.unshift(pastLog[i]);
  }
  const buildHistory = () => {
    // 編集モード除外で生じる同役割の連続はマージし、先頭はuserに揃える（API制約）
    const merged = [];
    for (const m of historyLog) {
      const role = m.role === 'ai' ? 'assistant' : 'user';
      if (merged.length && merged[merged.length - 1].role === role) {
        merged[merged.length - 1].text += '\n\n' + m.text;
      } else {
        merged.push({ role, text: m.text });
      }
    }
    while (merged.length && merged[0].role === 'assistant') merged.shift();
    return merged;
  };

  try {
    const model = getSelectedModel();
    const key = apiKeys[provider];
    let resultText = '';

    if (provider === 'anthropic') {
      const currentContent = imgSnapshot
        ? [
            { type: 'image', source: { type: 'base64', media_type: imgSnapshot.mimeType, data: imgSnapshot.base64 } },
            { type: 'text', text: prompt }
          ]
        : prompt;
      const messages = [
        ...buildHistory().map(m => ({ role: m.role, content: m.text })),
        { role: 'user', content: currentContent }
      ];
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'content-type': 'application/json',
          'x-api-key': key,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model, max_tokens: MAX_OUT[provider],
          ...(systemPrompt ? { system: systemPrompt } : {}),
          messages
        })
      });
      if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error?.message || `HTTP ${res.status}`); }
      const data = await res.json();
      resultText = data.content[0]?.text?.trim() ?? '';

    } else if (provider === 'openai' || provider === 'groq') {
      const baseUrl = provider === 'openai'
        ? 'https://api.openai.com'
        : 'https://api.groq.com/openai';
      const currentContent = imgSnapshot
        ? [
            { type: 'image_url', image_url: { url: imgSnapshot.dataUrl } },
            { type: 'text', text: prompt }
          ]
        : prompt;
      const messages = [
        ...(systemPrompt ? [{ role: 'system', content: systemPrompt }] : []),
        ...buildHistory().map(m => ({ role: m.role, content: m.text })),
        { role: 'user', content: currentContent }
      ];
      const res = await fetch(baseUrl + '/v1/chat/completions', {
        method: 'POST',
        headers: {
          'content-type': 'application/json',
          'authorization': 'Bearer ' + key,
        },
        body: JSON.stringify({ model, max_tokens: MAX_OUT[provider], messages })
      });
      if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error?.message || `HTTP ${res.status}`); }
      const data = await res.json();
      resultText = data.choices[0]?.message?.content?.trim() ?? '';

    } else if (provider === 'gemini') {
      const currentParts = imgSnapshot
        ? [
            { inline_data: { mime_type: imgSnapshot.mimeType, data: imgSnapshot.base64 } },
            { text: prompt }
          ]
        : [{ text: prompt }];
      const contents = [
        ...buildHistory().map(m => ({
          role: m.role === 'assistant' ? 'model' : 'user',
          parts: [{ text: m.text }]
        })),
        { role: 'user', parts: currentParts }
      ];
      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`,
        {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({
            ...(systemPrompt ? { systemInstruction: { parts: [{ text: systemPrompt }] } } : {}),
            contents
          })
        }
      );
      if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error?.message || `HTTP ${res.status}`); }
      const data = await res.json();
      resultText = data.candidates[0]?.content?.parts[0]?.text?.trim() ?? '';

    } else if (provider === 'builtin') {
      // ブラウザ内蔵AI（キー不要）。会話履歴はプロンプト文字列に埋め込む
      const historyText = buildHistory()
        .map(m => `${m.role === 'assistant' ? 'あなた' : 'ユーザー'}: ${m.text}`)
        .join('\n');
      const fullPrompt = isEditMode
        ? prompt
        : `${systemPrompt}

これまでの会話:
${historyText || '（まだ会話なし）'}

ユーザーの新しい発言: ${instruction}

返答のみを出力してください。`;
      resultText = await builtinComplete(fullPrompt);
    }

    removeTyping(typingId);

    if (isEditMode) {
      // 編集モード: JSON解析してreplyはチャット・editはdiffへ
      const parsed = parseEditResponse(resultText);
      if (parsed.reply) addMessage('ai', parsed.reply, null, 'edit');
      if (parsed.edit) showInlineDiff(targetText, parsed.edit, hasSelection, savedSelStart, savedSelEnd);
    } else {
      // 会話モード: チャット返答 + 自動生成ONなら毎ターン、あるべき像を生成して本文へ直接反映
      addMessage('ai', resultText);
      if (draftGenOn) proposeDraftUpdate();
      maybeCompactChat(); // 未圧縮分が溜まっていたら裏で議論メモを更新
    }

  } catch (err) {
    removeTyping(typingId);
    addMessage('ai', 'エラー: ' + err.message, null, 'system');
  } finally {
    btn.innerHTML = '↑';
    btn.disabled = false;
  }
}

let previewOn = false;

// H2/H3/太字のみの軽量レンダラ（ライターAIの許可記法と同じ範囲）
function renderMarkdown(md) {
  const inline = s => esc(s).replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  return md.split('\n').map(line => {
    if (/^###\s+/.test(line)) return `<h3>${inline(line.replace(/^###\s+/, ''))}</h3>`;
    if (/^##\s+/.test(line)) return `<h2>${inline(line.replace(/^##\s+/, ''))}</h2>`;
    if (!line.trim()) return '';
    return `<p>${inline(line)}</p>`;
  }).join('');
}

// ==================== Inline Diff ====================
let diffBlocks = [];
let diffSel = { start: 0, end: 0, isSelection: false };

function lcsLines(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({ length: m + 1 }, () => new Uint16Array(n + 1));
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] + 1 : Math.max(dp[i-1][j], dp[i][j-1]);
  const r = []; let i = m, j = n;
  while (i > 0 && j > 0) {
    if (a[i-1] === b[j-1]) { r.unshift(a[i-1]); i--; j--; }
    else if (dp[i-1][j] >= dp[i][j-1]) i--;
    else j--;
  }
  return r;
}

// 変更ブロック内の文字レベル差分。共通の前後を削ってから文字LCSを取り、
// del側/add側それぞれのHTML（変更箇所を.cdhで強調）を返す。大きすぎる場合はnull（従来表示）
function charDiffParts(oldText, newText) {
  if (!oldText || !newText) return null;
  let p = 0;
  const minLen = Math.min(oldText.length, newText.length);
  while (p < minLen && oldText[p] === newText[p]) p++;
  let suf = 0;
  while (suf < minLen - p && oldText[oldText.length - 1 - suf] === newText[newText.length - 1 - suf]) suf++;
  const oldMid = oldText.slice(p, oldText.length - suf);
  const newMid = newText.slice(p, newText.length - suf);
  if (oldMid.length * newMid.length > 300000) return null;
  const m = oldMid.length, n = newMid.length;
  const dp = Array.from({ length: m + 1 }, () => new Uint16Array(n + 1));
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = oldMid[i - 1] === newMid[j - 1] ? dp[i - 1][j - 1] + 1 : Math.max(dp[i - 1][j], dp[i][j - 1]);
  const ops = [];
  let i = m, j = n;
  while (i > 0 || j > 0) {
    if (i > 0 && j > 0 && oldMid[i - 1] === newMid[j - 1]) { ops.push(['=', oldMid[i - 1]]); i--; j--; }
    else if (j > 0 && (i === 0 || dp[i][j - 1] >= dp[i - 1][j])) { ops.push(['+', newMid[j - 1]]); j--; }
    else { ops.push(['-', oldMid[i - 1]]); i--; }
  }
  ops.reverse();
  const head = esc(oldText.slice(0, p));
  const tail = esc(suf ? oldText.slice(oldText.length - suf) : '');
  let delHtml = head, addHtml = head;
  let buf = '', mode = '';
  const flush = () => {
    if (!buf) return;
    const e = esc(buf);
    if (mode === '=') { delHtml += e; addHtml += e; }
    else if (mode === '-') delHtml += `<span class="cdh">${e}</span>`;
    else addHtml += `<span class="cdh">${e}</span>`;
    buf = '';
  };
  for (const [t, ch] of ops) {
    if (t !== mode) { flush(); mode = t; }
    buf += ch;
  }
  flush();
  delHtml += tail; addHtml += tail;
  return { delHtml, addHtml };
}

function buildDiffBlocks(oldText, newText) {
  const ol = oldText.split('\n'), nl = newText.split('\n');
  const lcs = lcsLines(ol, nl);
  const blocks = [];
  let i = 0, j = 0, k = 0;
  let unchanged = [], changed = null;

  function flushUnchanged() {
    if (unchanged.length) { blocks.push({ type: 'unchanged', lines: [...unchanged] }); unchanged = []; }
  }
  function flushChanged() {
    if (changed) { blocks.push({ ...changed }); changed = null; }
  }

  while (i < ol.length || j < nl.length) {
    if (k < lcs.length && i < ol.length && ol[i] === lcs[k] && j < nl.length && nl[j] === lcs[k]) {
      flushChanged(); unchanged.push(ol[i]); i++; j++; k++;
    } else {
      flushUnchanged();
      if (!changed) changed = { type: 'changed', oldLines: [], newLines: [], accepted: null };
      if (j < nl.length && (k >= lcs.length || nl[j] !== lcs[k])) { changed.newLines.push(nl[j]); j++; }
      else { changed.oldLines.push(ol[i]); i++; }
    }
  }
  flushChanged(); flushUnchanged();

  let id = 0;
  for (const b of blocks) if (b.type === 'changed') b.id = id++;
  return blocks;
}

function showInlineDiff(oldText, newText, isSelection = false, sStart = 0, sEnd = 0) {
  diffBlocks = buildDiffBlocks(oldText, newText);
  diffSel = { start: sStart, end: sEnd, isSelection };

  const changedCount = diffBlocks.filter(b => b.type === 'changed').length;
  if (changedCount === 0) { addMessage('ai', '変更はありません', null, 'system'); return; }

  if (previewOn) togglePreview(); // プレビュー中ならdiffを優先して閉じる
  document.querySelector('.editor-scroll').style.display = 'none';
  document.getElementById('diff-view').classList.add('active');
  document.getElementById('diff-controls').classList.add('active');
  renderDiffView();
  updateDiffInfo();
}

function renderDiffView() {
  document.getElementById('diff-view').innerHTML = diffBlocks.map(b => {
    if (b.type === 'unchanged') return `<div class="diff-unchanged">${esc(b.lines.join('\n'))}</div>`;
    const cls = b.accepted === true ? 'accepted' : b.accepted === false ? 'rejected' : '';
    const cd = (b.oldLines.length && b.newLines.length)
      ? charDiffParts(b.oldLines.join('\n'), b.newLines.join('\n'))
      : null;
    const dels = cd
      ? `<span class="diff-del-line cd">${cd.delHtml}</span>`
      : b.oldLines.map(l => `<span class="diff-del-line">${esc(l)}</span>`).join('');
    const adds = cd
      ? `<span class="diff-add-line cd">${cd.addHtml}</span>`
      : b.newLines.map(l => `<span class="diff-add-line">${esc(l)}</span>`).join('');
    return `<div class="diff-changed-block ${cls}" id="diff-block-${b.id}" onclick="toggleBlock(${b.id})">${dels}${adds}</div>`;
  }).join('');
}

// ブロックタップで却下（もう一度タップで取り消し）。何もしなければ確定時・次ターン時に反映される
function toggleBlock(id) {
  const b = diffBlocks.find(x => x.type === 'changed' && x.id === id);
  if (!b) return;
  b.accepted = b.accepted === false ? null : false;
  document.getElementById(`diff-block-${id}`).className =
    'diff-changed-block' + (b.accepted === false ? ' rejected' : '');
  updateDiffInfo();
}

function rejectAllBlocks() {
  // 提案を丸ごと破棄して閉じる
  closeDiffView();
  showToast('提案を破棄しました');
}

function updateDiffInfo() {
  const total = diffBlocks.filter(b => b.type === 'changed').length;
  const rej = diffBlocks.filter(b => b.type === 'changed' && b.accepted === false).length;
  document.getElementById('diff-controls-info').textContent =
    rej > 0 ? `確定で${total - rej}件反映（${rej}件却下）` : `確定で${total}件反映`;
}

// diff適用で本文が変わる直前の状態を世代保存（最大10件・undo/redo対応）
// ストレージ構造: { snaps: [{body, at},...], cursor: number }
// cursor は「現在表示中の位置」。通常は snaps.length（最新）。undo で -1、redo で +1。

function getSnapState(key) {
  try { return JSON.parse(localStorage.getItem(key) || 'null'); } catch {}
  return null;
}

function pushSnapshot() {
  const body = document.getElementById('editor').value;
  const key = 'ohire-snapshots_' + (currentDraftId || 'default');
  let state = getSnapState(key) || { snaps: [], cursor: 0 };
  // cursor が末尾以外（undo後）なら、その先の履歴を捨てて分岐
  state.snaps = state.snaps.slice(0, state.cursor);
  state.snaps.push({ body, at: Date.now() });
  if (state.snaps.length > 20) state.snaps = state.snaps.slice(-20);
  state.cursor = state.snaps.length;
  safeSetItem(key, JSON.stringify(state));
}

function restoreSnapshot() {
  if (previewOn) togglePreview();
  const key = 'ohire-snapshots_' + (currentDraftId || 'default');
  let state = getSnapState(key) || { snaps: [], cursor: 0 };
  if (state.cursor <= 0 || state.snaps.length === 0) { showToast('戻せる履歴がありません'); return; }
  // 現在の本文を「進む先」として保持するため、cursor が末尾なら現在値を末尾に追加
  if (state.cursor === state.snaps.length) {
    state.snaps.push({ body: document.getElementById('editor').value, at: Date.now() });
  }
  state.cursor -= 1;
  if (diffBlocks.length > 0) closeDiffView();
  document.getElementById('editor').value = state.snaps[state.cursor].body;
  safeSetItem(key, JSON.stringify(state));
  scheduleAutoSave();
  showToast('↩ 戻しました');
}

function forwardSnapshot() {
  if (previewOn) togglePreview();
  const key = 'ohire-snapshots_' + (currentDraftId || 'default');
  let state = getSnapState(key) || { snaps: [], cursor: 0 };
  if (state.cursor >= state.snaps.length - 1) { showToast('進める履歴がありません'); return; }
  state.cursor += 1;
  if (diffBlocks.length > 0) closeDiffView();
  document.getElementById('editor').value = state.snaps[state.cursor].body;
  safeSetItem(key, JSON.stringify(state));
  scheduleAutoSave();
  showToast('↪ 進めました');
}

function finalizeDiff() {
  const lines = [];
  for (const b of diffBlocks) {
    if (b.type === 'unchanged') lines.push(...b.lines);
    else lines.push(...(b.accepted === false ? b.oldLines : b.newLines));
  }
  const finalText = lines.join('\n');
  const ed = document.getElementById('editor');
  const newValue = diffSel.isSelection
    ? ed.value.substring(0, diffSel.start) + finalText + ed.value.substring(diffSel.end)
    : finalText;
  if (newValue !== ed.value) pushSnapshot();
  ed.value = newValue;
  scheduleAutoSave();
  closeDiffView();
  showToast('✓ 変更を適用しました');
}

function closeDiffView() {
  diffBlocks = [];
  document.getElementById('diff-view').classList.remove('active');
  document.getElementById('diff-controls').classList.remove('active');
  document.querySelector('.editor-scroll').style.display = '';
}

function resolveOpenDiff() {
  // 表示中のdiffを、却下ブロック以外すべて反映して閉じる（放置＝承認）
  if (!diffBlocks.length) return;
  const lines = [];
  for (const b of diffBlocks) {
    if (b.type === 'unchanged') lines.push(...b.lines);
    else lines.push(...(b.accepted === false ? b.oldLines : b.newLines));
  }
  const ed = document.getElementById('editor');
  const newValue = diffSel.isSelection
    ? ed.value.substring(0, diffSel.start) + lines.join('\n') + ed.value.substring(diffSel.end)
    : lines.join('\n');
  if (newValue !== ed.value) {
    pushSnapshot();
    ed.value = newValue;
    scheduleAutoSave();
  }
  closeDiffView();
}

// ==================== 単発AI呼び出し ====================
// ブラウザ内蔵AI（Chrome Prompt API / Gemini Nano）。キー不要・無料・オンデバイス実行
async function builtinComplete(prompt) {
  if (typeof LanguageModel === 'undefined') {
    throw new Error('このブラウザは内蔵AI非対応です（デスクトップ版Chrome 148以降で利用可）');
  }
  const availability = await LanguageModel.availability();
  if (availability === 'unavailable') throw new Error('この端末では内蔵AIモデルを利用できません');
  if (availability !== 'available') showToast('内蔵AIモデルをダウンロード中…（初回のみ・数分かかることがあります）');
  const session = await LanguageModel.create();
  try {
    return (await session.prompt(prompt)).trim();
  } finally {
    session.destroy?.();
  }
}

// 全文再生成が尻切れにならない出力上限（Geminiはデフォルト上限を使用）
const MAX_OUT = { anthropic: 16384, openai: 16384, groq: 8192 };

// 会話履歴なしの単発プロンプトを現在のプロバイダーに投げる（下書き生成・議論メモ圧縮で使用）
async function singleShotComplete(prompt) {
  const provider = getSelectedProvider();
  if (provider === 'builtin') return builtinComplete(prompt);
  const key = apiKeys[provider];
  if (!key) throw new Error('APIキー未設定');
  const model = getSelectedModel();
  if (provider === 'anthropic') {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'content-type': 'application/json', 'x-api-key': key, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({ model, max_tokens: MAX_OUT.anthropic, messages: [{ role: 'user', content: prompt }] })
    });
    if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(`HTTP ${res.status}: ${e.error?.message || JSON.stringify(e)}`); }
    return (await res.json()).content[0]?.text?.trim() ?? '';
  } else if (provider === 'openai' || provider === 'groq') {
    const baseUrl = provider === 'openai' ? 'https://api.openai.com' : 'https://api.groq.com/openai';
    const res = await fetch(baseUrl + '/v1/chat/completions', {
      method: 'POST',
      headers: { 'content-type': 'application/json', 'authorization': 'Bearer ' + key },
      body: JSON.stringify({ model, max_tokens: MAX_OUT[provider], messages: [{ role: 'user', content: prompt }] })
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return (await res.json()).choices[0]?.message?.content?.trim() ?? '';
  } else if (provider === 'gemini') {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`, {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ contents: [{ role: 'user', parts: [{ text: prompt }] }] })
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return (await res.json()).candidates[0]?.content?.parts[0]?.text?.trim() ?? '';
  }
  return '';
}

// ==================== Draft auto-proposal ====================
// ライターAI用プロンプトの組み立て（毎ターン生成と⚡本気リライトの1パス目で共用）
function buildWriterPrompt() {
  const currentDraft = document.getElementById('editor').value.trim();

  // メモに畳み込み済みより後の、会話モードのやり取りを素材にする（それ以前は議論メモが担う）
  const chatModeLog = chatLog.slice(chatMemo.upTo).filter(m => (m.mode ?? 'chat') === 'chat');
  const limit = 30000; // コンテキスト暴走防止の上限。超えた分は古い方から切る
  let total = 0;
  const collected = [];
  for (let i = chatModeLog.length - 1; i >= 0; i--) {
    const line = `${chatModeLog[i].role === 'user' ? 'ユーザー' : 'AI'}: ${chatModeLog[i].text}`;
    total += line.length;
    if (total > limit) break;
    collected.unshift(chatModeLog[i]);
  }
  const recentChat = collected.map(m =>
    `${m.role === 'user' ? 'ユーザー' : 'AI'}: ${m.text}`
  ).join('\n');

  const toneInst = getToneInstruction();
  const styleMemo = getStyleMemo();
  const toneLine = (toneInst ? `\n文体指定: ${toneInst}` : '')
    + (styleMemo ? `\n執筆方針（必ず守る）:\n${styleMemo}` : '');

  const prompt = currentDraft
    ? `あなたは記事ライターです。以下はユーザーとAIの壁打ち（議論）の記録です。現時点の議論を過不足なく反映した記事を書いてください。

- 記事の分量と完成度は議論の蓄積量に比例させる。会話で語られていないことを想像で補完・水増ししない。議論が浅いうちは短い記事や骨子で構わない
- 単にユーザーの発言を書き起こすのではなく、議論から生まれた考え・洞察・結論を読み物として自然な文章に昇華させる
- 現在の下書きは過去の生成結果にユーザーが手を入れたものです。会話と矛盾しない言い回し・表現はできるだけ残す
- ただし下書きへの微調整に留めないこと。構成・内容は会話全体から導いたあるべき形を優先し、議論が進んで構成が古くなっていれば恐れず組み替える
- 会話に新しい内容がなく、下書きが既にあるべき形と一致している場合のみ「NO_CHANGE」とだけ返す

※H1(#)は使用不可。見出しはH2(##)とH3(###)のみ使用すること。太字(**)は使用可。
※表はMarkdownの表（|区切り）ではなく、noteで描画されるKaTeX形式で書くこと:
$$\\begin{array}{l|l} \\text{見出し} & \\text{見出し} \\\\ \\hline \\text{セル} & \\text{セル} \\end{array}$$
（日本語セルは必ず\\text{}で包む。列数は3列程度までに抑える）${toneLine}

これまでの議論メモ（古い会話の要約）:
${chatMemo.text || '（なし）'}

直近の会話:
${recentChat}

現在の下書き:
${currentDraft}

あるべき記事の全文のみを返してください。`
    : `あなたは記事ライターです。以下はユーザーとAIの壁打ち（議論）の記録です。現時点の議論を過不足なく反映した下書きを書いてください。
単にユーザーの発言を書き起こすのではなく、議論から生まれた考え・洞察・結論を、読み物として自然な文章に昇華させてください。
分量は議論の蓄積量に比例させること。会話で語られていないことを想像で補完・水増ししない。議論がまだ浅ければ数段落の短い下書きや骨子で構わない（議論が深まるたびに記事は育っていく）。
※H1(#)は使用不可。見出しはH2(##)とH3(###)のみ使用すること。太字(**)は使用可。タイトル行(#)は書かず本文のみ返すこと。
※表はMarkdownの表（|区切り）ではなく、noteで描画されるKaTeX形式で書くこと:
$$\\begin{array}{l|l} \\text{見出し} & \\text{見出し} \\\\ \\hline \\text{セル} & \\text{セル} \\end{array}$$
（日本語セルは必ず\\text{}で包む。列数は3列程度までに抑える）${toneLine}

これまでの議論メモ（古い会話の要約）:
${chatMemo.text || '（なし）'}

直近の会話:
${recentChat}

本文のみを返してください（タイトルは含めない）。`;

  return { prompt, currentDraft };
}

async function proposeDraftUpdate(_retry = false) {
  if (getSelectedProvider() !== 'builtin' && !apiKeys[getSelectedProvider()]) return;
  const { prompt, currentDraft } = buildWriterPrompt();

  // チャットにはtypingを出さない（バックグラウンド処理）
  try {
    const resultText = await singleShotComplete(prompt);
    const noChange = /^[「"'\s]*NO_CHANGE[」"'\s]*$/.test(resultText);
    if (resultText && !noChange && resultText !== currentDraft) {
      // 本文を手編集中なら割り込まず保留し、エディタを離れたタイミングで表示する
      const active = document.activeElement;
      if (active === document.getElementById('editor') || active === document.getElementById('title-input')) {
        pendingProposal = resultText;
        return;
      }
      presentDraftProposal(resultText);
    }
  } catch (e) {
    if (!_retry) {
      await new Promise(r => setTimeout(r, 2000));
      proposeDraftUpdate(true);
    } else {
      addDraftErrorMessage(e.message);
    }
  }
}

// ライターAIの提案をdiffレビューとして表示する（即時表示と保留分の表示で共用）
function presentDraftProposal(resultText) {
  // 選択編集のdiffをレビュー中なら、この自動提案は捨てる（次のターンで再生成される）
  if (diffBlocks.length > 0 && diffSel.isSelection) return;
  // 前の提案diffが残っていれば「却下ブロック以外をすべて反映」して閉じる（放置＝承認）
  resolveOpenDiff();
  const baseText = document.getElementById('editor').value.trim();
  if (resultText === baseText) return;
  showInlineDiff(baseText, resultText);
  showEditorBadge(baseText ? '更新案あり' : '下書き生成');
}

function flushPendingProposal() {
  if (!pendingProposal) return;
  if (selStart !== selEnd) return; // 選択→編集指示の途中と思われる間は保留を続ける
  const p = pendingProposal;
  pendingProposal = null;
  presentDraftProposal(p);
}

// ==================== ⚡ 本気リライト ====================
function setDeepRewriteProgress(step) {
  // step: 0=非表示, 1=執筆中, 2=批評中, 3=仕上げ中
  const bar = document.getElementById('deep-rewrite-progress');
  if (step === 0) { bar.classList.remove('active'); return; }
  bar.classList.add('active');
  [1, 2, 3].forEach(i => {
    const el = document.getElementById('drp-' + i);
    el.className = 'step' + (i < step ? ' done' : i === step ? ' active' : '');
  });
}
// 書く→読者目線で批評（Web検索つき）→仕上げ の3パス。夜間リライトのアプリ内普及版
let deepRewriting = false;

async function deepRewrite() {
  if (deepRewriting) { showToast('⚡ 実行中です…'); return; }
  const provider = getSelectedProvider();
  if (provider !== 'builtin' && !apiKeys[provider]) { showApiKeyModal(); return; }
  if (diffBlocks.length > 0 && diffSel.isSelection) { showToast('選択編集のレビュー中は実行できません'); return; }
  const hasChat = chatLog.some(m => (m.mode ?? 'chat') === 'chat');
  if (!hasChat && !document.getElementById('editor').value.trim()) {
    showToast('材料がありません（会話か下書きが必要です）'); return;
  }
  const chosenModel = await showDeepRewriteModelModal();
  if (!chosenModel) return;
  _modelOverride = chosenModel;
  deepRewriting = true;
  try {
    setDeepRewriteProgress(1);
    const draft = await singleShotComplete(buildWriterPrompt().prompt);
    if (!draft) throw new Error('生成結果が空でした');

    setDeepRewriteProgress(2);
    let critique = '';
    try {
      critique = await criticComplete(`あなたは厳しい編集者兼ファクトチェッカーです。以下の記事を初見の読者として読み、簡潔に指摘してください。
1. 読者として引っかかる弱点（論理の飛躍・冗長・導入の弱さなど）を最大3つ
2. 事実関係が怪しい記述があればWeb検索で確認し、誤りを具体的に指摘する（検索が使えない場合は知識の範囲で）
良い点は書かない。修正指示のみ、全体で400字以内。

記事:
${draft}`);
    } catch { /* 批評に失敗しても1パス目の結果で続行 */ }

    let result = draft;
    if (critique) {
      setDeepRewriteProgress(3);
      const toneInst = getToneInstruction();
      const styleMemo = getStyleMemo();
      const toneLine = (toneInst ? `\n文体指定: ${toneInst}` : '')
        + (styleMemo ? `\n執筆方針（必ず守る）:\n${styleMemo}` : '');
      result = await singleShotComplete(`あなたは記事ライターです。以下の記事に編集者の指摘を反映して書き直してください。
- 指摘が明らかに不適切な場合は無視してよい
- ※H1(#)は使用不可。見出しはH2(##)とH3(###)のみ使用すること。太字(**)は使用可。
- 表はMarkdownの表（|区切り）ではなく、noteで描画されるKaTeX形式（$$\\begin{array}{l|l} \\text{見出し} & \\text{見出し} \\\\ \\hline \\text{セル} & \\text{セル} \\end{array}$$、日本語セルは\\text{}で包む）で書くこと${toneLine}

記事:
${draft}

編集者の指摘:
${critique}

書き直した記事全文のみを返してください。`) || draft;
    }

    resolveOpenDiff();
    setDeepRewriteProgress(0);
    const baseText = document.getElementById('editor').value.trim();
    if (!result.trim() || result.trim() === baseText) { showToast('変更はありませんでした'); return; }
    if (critique) addMessage('ai', '⚡ 編集者の指摘:\n' + critique, null, 'system');
    showInlineDiff(baseText, result.trim());
    showEditorBadge('⚡ 本気リライト案');
  } catch (e) {
    setDeepRewriteProgress(0);
    showToast('⚡ エラー: ' + e.message);
  } finally {
    deepRewriting = false;
    _modelOverride = null;
  }
}

// 批評パス：Claude/GeminiはWeb検索つき、他は知識の範囲で（検索失敗時も通常呼び出しへフォールバック）
async function criticComplete(prompt) {
  const provider = getSelectedProvider();
  try {
    if (provider === 'anthropic') return await anthropicSearchComplete(prompt);
    if (provider === 'gemini') return await geminiSearchComplete(prompt);
  } catch { /* 検索つき呼び出しが使えない環境では通常呼び出しへ */ }
  return singleShotComplete(prompt);
}

async function anthropicSearchComplete(prompt) {
  const key = apiKeys.anthropic;
  const model = getSelectedModel();
  let messages = [{ role: 'user', content: prompt }];
  for (let i = 0; i < 4; i++) {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'content-type': 'application/json', 'x-api-key': key, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({
        model, max_tokens: MAX_OUT.anthropic,
        tools: [{ type: 'web_search_20260209', name: 'web_search' }],
        messages
      })
    });
    if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(`HTTP ${res.status}: ${e.error?.message || JSON.stringify(e)}`); }
    const data = await res.json();
    // サーバー側検索ループが上限に達した場合は続きを要求する
    if (data.stop_reason === 'pause_turn') {
      messages = [...messages, { role: 'assistant', content: data.content }];
      continue;
    }
    return (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('\n').trim();
  }
  throw new Error('検索が長引いたため中断しました');
}

async function geminiSearchComplete(prompt) {

  const model = getSelectedModel();
  const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`, {

    body: JSON.stringify({

      contents: [{ role: 'user', parts: [{ text: prompt }] }]
    })
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);

}

function parseEditResponse(text) {
  // まず最初の{〜最後の}を試す（編集後テキストに}が含まれても壊れない）
  const first = text.indexOf('{'), last = text.lastIndexOf('}');
  if (first !== -1 && last > first) {
    try {
      const o = JSON.parse(text.slice(first, last + 1));
      if (typeof o.edit === 'string') return { reply: o.reply ?? null, edit: o.edit };
    } catch {}
  }
  // 次に非貪欲マッチ（JSONの後ろに}を含む説明文が付いたケース用）
  const m = text.match(/\{[\s\S]*?"reply"[\s\S]*?"edit"[\s\S]*?\}/) ||
            text.match(/\{[\s\S]*?"edit"[\s\S]*?"reply"[\s\S]*?\}/);
  if (m) {
    try { return JSON.parse(m[0]); } catch {}
  }
  // フォールバック: 全文をeditとして扱う
  return { reply: null, edit: text };
}

  const drafts = getDrafts();

    if (idx >= 0) {
      drafts[idx] = { ...drafts[idx], title: title || '（無題）', body, updated: now };

  if (navigator.clipboard?.writeText) {
    navigator.clipboard.writeText(text).then(done).catch(() => { fallbackCopy(text); done(); });
  } else {
    fallbackCopy(text);
    done();
  }
}

  ta.style.position = 'fixed';
  ta.style.opacity = '0';

  ta.select();
  document.execCommand('copy');
  ta.remove();

// ==================== GitHub同期 ====================
// 同期先はユーザー自身のリポジトリ（プライベート可）。データ構成:
//   drafts/<id>/article.md … タイトル(H1)+本文。人間・Claude Codeがそのまま読み書きする正本
//   drafts/<id>/data.json  … メタ情報（updated等）とチャットログ・議論メモ
//   settings.json          … 文体・執筆方針
// article.md の本文が data.json と食い違っていたら「外部（Claude Code・夜間リライト等）での編集」
// とみなし、↓読み込み時にdiffレビュー（夜間リライト案と同じUI）として提示する。

// アプリを閉じる・他アプリに切り替えた時、未同期の変更があれば自動で☁️保存（ベストエフォート）
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden' && repoDirty && githubPAT && dataRepo) {
    repoUpload(true);
  }
});

// このセッションで把握しているリモートの状態（差分アップロードとsha競合の解決に使う）
const remoteSha = {};     // path -> sha（未取得はキーなし、リモートに無いファイルはnull）
const remoteContent = {}; // path -> content

function ghHeaders() {
  return {
    'Authorization': `Bearer ${githubPAT}`,
    'Accept': 'application/vnd.github+json',
    'X-GitHub-Api-Version': '2022-11-28',
  };
}

// UTF-8対応のbase64。大きな文字列でもスタックを溢れさせないよう分割処理
function b64encode(str) {
  const bytes = new TextEncoder().encode(str);
  let bin = '';
  for (let i = 0; i < bytes.length; i += 0x8000) {
    bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
  }
  return btoa(bin);
}
function b64decode(b64) {
  const bin = atob(b64.replace(/\s/g, ''));
  return new TextDecoder().decode(Uint8Array.from(bin, c => c.charCodeAt(0)));
}

// ファイル取得。404（未作成）はnull
async function ghGetFile(path) {
  const res = await fetch(`https://api.github.com/repos/${dataRepo}/contents/${path}`, { headers: ghHeaders() });
  if (res.status === 404) { remoteSha[path] = null; remoteContent[path] = null; return null; }
  if (!res.ok) {
    // 約1MB超のファイルはcontents APIが本文を返せない（403）。
    // shaは親ディレクトリ一覧から、本文はraw形式で取得するフォールバック
    const [sha, rawRes] = await Promise.all([
      ghGetShaFromDir(path),
      fetch(`https://api.github.com/repos/${dataRepo}/contents/${path}`,
        { headers: { ...ghHeaders(), 'Accept': 'application/vnd.github.raw' } })
    ]);
    if (sha && rawRes.ok) {
      const content = await rawRes.text();
      remoteSha[path] = sha; remoteContent[path] = content;
      return { sha, content };
    }
    throw new Error(`GitHub API: ${res.status}`);
  }
  const json = await res.json();
  const content = b64decode(json.content);
  remoteSha[path] = json.sha;
  remoteContent[path] = content;
  return { sha: json.sha, content };
}

// 親ディレクトリ一覧からshaを取得（ファイル本体を取らないためサイズ制限の影響を受けない）
async function ghGetShaFromDir(path) {
  try {
    const dir = path.includes('/') ? path.slice(0, path.lastIndexOf('/')) : '';
    const res = await fetch(`https://api.github.com/repos/${dataRepo}/contents/${dir}`, { headers: ghHeaders() });
    if (!res.ok) return null;
    const list = await res.json();
    const f = Array.isArray(list) ? list.find(x => x.path === path) : null;
    return f ? f.sha : null;
  } catch (e) { return null; }
}

// 内容に変更がある時だけPUT。sha競合（並行更新）は取り直して1回だけ上書き再試行
// （どちらの内容を残すかのマージ判断は↓読み込み側の役割）
async function ghSyncFile(path, content, message) {
  if (!(path in remoteSha)) await ghGetFile(path);
  if (remoteContent[path] === content) return false;
  const put = () => fetch(`https://api.github.com/repos/${dataRepo}/contents/${path}`, {
    method: 'PUT',
    headers: { ...ghHeaders(), 'Content-Type': 'application/json' },
    body: JSON.stringify({ message, content: b64encode(content), ...(remoteSha[path] ? { sha: remoteSha[path] } : {}) })
  });
  let res = await put();
  if (res.status === 409 || res.status === 422) {
    await ghGetFile(path);
    res = await put();
  }
  if (!res.ok) throw new Error(`GitHub API: ${res.status}`);
  remoteSha[path] = (await res.json()).content.sha;
  remoteContent[path] = content;
  return true;
}

async function ghDeleteFile(path, message) {
  if (!(path in remoteSha)) await ghGetFile(path);
  if (!remoteSha[path]) return;
  const res = await fetch(`https://api.github.com/repos/${dataRepo}/contents/${path}`, {
    method: 'DELETE',
    headers: { ...ghHeaders(), 'Content-Type': 'application/json' },
    body: JSON.stringify({ message, sha: remoteSha[path] })
  });
  if (res.ok) { remoteSha[path] = null; remoteContent[path] = null; }
}

// pathの最新コミットメッセージ（外部編集の要約表示に使う）
async function ghLastCommitMessage(path) {
  try {
    const res = await fetch(
      `https://api.github.com/repos/${dataRepo}/commits?path=${encodeURIComponent(path)}&per_page=1`,
      { headers: ghHeaders() }
    );
    if (!res.ok) return '';
    return (await res.json())[0]?.commit?.message || '';
  } catch { return ''; }
}

function articleMd(title, body) { return `# ${title}\n\n${body}\n`; }

function parseArticleMd(text) {
  const m = String(text).match(/^# (.*)\n+([\s\S]*)$/);
  return m
    ? { title: m[1].trim(), body: m[2].replace(/\n$/, '') }
    : { title: '', body: String(text).replace(/\n$/, '') };
}

function draftDataJson(d) {
  let log = [], memo = null;
  try { log = JSON.parse(localStorage.getItem('ohire-chat_log_' + d.id) || '[]'); } catch {}
  try { memo = JSON.parse(localStorage.getItem('ohire-chat_memo_' + d.id) || 'null'); } catch {}
  return JSON.stringify({
    id: d.id, title: d.title, body: d.body,
    created: d.created, updated: d.updated,
    chatLog: log, chatMemo: memo
  }, null, 2);
}

async function repoUpload(silent = false) {
  if (!githubPAT || !dataRepo) { if (!silent) { showToast('GitHub同期を設定してください'); showRepoModal(); } return; }
  autoSaveCurrentDraft(); // 編集中の内容（デバウンス待ち分）を確定させてから同期
  saveChatLog();
  saveChatMemo();
  try {
    if (!silent) showToast('アップロード中…');
    for (const d of getDrafts()) {
      await ghSyncFile(`drafts/${d.id}/article.md`, articleMd(d.title, d.body), `更新: ${d.title}`);
      await ghSyncFile(`drafts/${d.id}/data.json`, draftDataJson(d), `更新: ${d.title}（メタ・チャット）`);
    }
    const settings = JSON.stringify({
      version: 3,
      styleMemo: localStorage.getItem('ohire-style_memo') || '',
      tone: localStorage.getItem('ohire-tone') || ''
    }, null, 2);
    await ghSyncFile('settings.json', settings, '更新: 設定');
    const guideCreated = await ensureRepoGuide();
    repoDirty = false;
    if (!silent) showToast('☁️ リポジトリに保存しました' + (guideCreated ? '（案内ファイル CLAUDE.md を作成）' : ''));
  } catch (e) { if (!silent) showToast('エラー: ' + e.message); }
}

// データリポジトリに案内ファイルを一度だけ置く（Claude Codeが構造とリライトルールを把握できるように）。
// 既にCLAUDE.mdがあるリポジトリには絶対に書かない。失敗しても保存自体は成功扱い。
async function ensureRepoGuide() {
  try {
    const res = await fetch(`https://api.github.com/repos/${dataRepo}/contents/CLAUDE.md`, { headers: ghHeaders() });
    if (res.status !== 404) return false; // 既存なら何もしない
    const guide = [
      '# ohire データリポジトリ',
      '',
      'note下書きアプリ **ohire** の成果物置き場。ohireアプリと夜間リライトActionsがここにコミットする。',
      '',
      '## 構造',
      '',
      '```',
      'drafts/<id>/article.md   … 下書き本文（# タイトル + 本文）← リライト対象はここ',
      'drafts/<id>/data.json    … メタデータ（タイトル・本文・壁打ちログ・メモ）',
      'settings.json            … 文体メモ・トーン設定',
      '```',
      '',
      '## リライト・編集を頼まれたら',
      '',
      '- 編集するのは `drafts/<id>/article.md` **のみ**。`data.json` は触らない（article.mdとdata.jsonの本文差分が「編集あり」のシグナルで、アプリがdiffレビュー表示する）',
      '- 文体は `settings.json` の styleMemo / tone に従う',
      '- 壁打ちの文脈は `drafts/<id>/data.json` の chatLog / chatMemo を参照する',
      '',
      'このファイルは ohire の初回保存時に自動作成されました。',
      ''
    ].join('\n');
    const put = await fetch(`https://api.github.com/repos/${dataRepo}/contents/CLAUDE.md`, {
      method: 'PUT', headers: ghHeaders(),
      body: JSON.stringify({ message: 'ohire: データ構造とリライトルールの案内ファイルを追加', content: b64encode(guide) })
    });
    return put.ok;
  } catch (e) { return false; }
}

async function repoDownload() {
  if (!githubPAT || !dataRepo) { showToast('GitHub同期を設定してください'); showRepoModal(); return; }
  try {
    showToast('ダウンロード中…');
    const res = await fetch(`https://api.github.com/repos/${dataRepo}/contents/drafts`, { headers: ghHeaders() });
    if (res.status === 404) { showToast('リポジトリにまだデータがありません。先に↑保存してください'); return; }
    if (!res.ok) throw new Error(`GitHub API: ${res.status}`);
    const entries = (await res.json()).filter(e => e.type === 'dir');

    const localDrafts = getDrafts();
    const localById = {};
    localDrafts.forEach(d => { localById[d.id] = d; });
    const remoteIds = new Set();
    const merged = [];

    for (const entry of entries) {
      const dataFile = await ghGetFile(`drafts/${entry.name}/data.json`);
      if (!dataFile) continue;
      let rd;
      try { rd = JSON.parse(dataFile.content); } catch { continue; }
      remoteIds.add(rd.id);

      // updatedが新しい方を正とする簡易マージ（Gist版と同じ方針）
      const ld = localById[rd.id];
      const base = ld && (ld.updated || 0) > (rd.updated || 0)
        ? { ...ld }
        : { id: rd.id, title: rd.title, body: rd.body, created: rd.created, updated: rd.updated };

      // チャットログ: メッセージ件数が多い方（＝進んでいる方）を採用
      let localLen = 0;
      try { localLen = (JSON.parse(localStorage.getItem('ohire-chat_log_' + rd.id) || '[]') || []).length; } catch {}
      if ((rd.chatLog || []).length >= localLen) safeSetItem('ohire-chat_log_' + rd.id, JSON.stringify(rd.chatLog || []));

      // 議論メモ: 畳み込み済み件数（upTo）が進んでいる方を採用
      let localUpTo = -1;
      try { localUpTo = (JSON.parse(localStorage.getItem('ohire-chat_memo_' + rd.id) || 'null') || {}).upTo ?? -1; } catch {}
      if (rd.chatMemo && (rd.chatMemo.upTo ?? 0) >= localUpTo) safeSetItem('ohire-chat_memo_' + rd.id, JSON.stringify(rd.chatMemo));

      // article.md の本文が data.json と食い違う＝外部（Claude Code・夜間リライト等）で編集された
      // → 夜間リライト案と同じdiffレビューとして取り込む（要約は最新コミットメッセージ）
      const artFile = await ghGetFile(`drafts/${entry.name}/article.md`);
      if (artFile) {
        const art = parseArticleMd(artFile.content);
        if (art.body.trim() !== (rd.body || '').trim() && art.body.trim() !== (base.body || '').trim()) {
          base.nightlyProposal = { body: art.body, summary: await ghLastCommitMessage(`drafts/${entry.name}/article.md`) };
        }
        if (art.title && art.title !== rd.title) base.title = art.title;
      }
      merged.push(base);
    }

    // ローカルにしかない下書き（最後のアップロード後に作成）は残す
    localDrafts.forEach(ld => { if (!remoteIds.has(ld.id)) merged.push(ld); });
    merged.sort((a, b) => (b.updated || 0) - (a.updated || 0));
    saveDraftsToStorage(merged);

    const settingsFile = await ghGetFile('settings.json');
    if (settingsFile) {
      try {
        const s = JSON.parse(settingsFile.content);
        if (typeof s.styleMemo === 'string' && s.styleMemo) {
          localStorage.setItem('ohire-style_memo', s.styleMemo);
          document.getElementById('style-memo').value = s.styleMemo;
        }
        if (typeof s.tone === 'string' && s.tone) {
          localStorage.setItem('ohire-tone', s.tone);
          document.getElementById('tone-select').value = s.tone;
        }
      } catch {}
    }

    // 現在の下書きを再描画（マージ結果を正とする）
    const cur = merged.find(d => d.id === currentDraftId);
    if (cur) {
      document.getElementById('title-input').value = cur.title === '（無題）' ? '' : cur.title;
      document.getElementById('editor').value = cur.body;
      autoResize(document.getElementById('title-input'));
      autoResize(document.getElementById('editor'));
      pendingProposal = null;
      setIndicator('保存済み');
      clearChatUI();
      const savedLog = localStorage.getItem('ohire-chat_log_' + currentDraftId);
      if (savedLog) {
        try {
          chatLog = JSON.parse(savedLog);
          chatLog.forEach(m => restoreChatMessage(m));
          if (chatLog.length > 0) document.getElementById('chat-empty')?.remove();
        } catch {}
      }
      loadChatMemo(currentDraftId);
      maybeShowNightlyProposal(cur);
    }
    showToast('☁️ リポジトリから読み込みました');
  } catch (e) { showToast('エラー: ' + e.message); }
}

// 下書き削除時、リモート側のファイルも消す（ベストエフォート）
function deleteDraftRemote(id) {
  if (!githubPAT || !dataRepo) return;
  ghDeleteFile(`drafts/${id}/article.md`, `削除: ${id}`).catch(() => {});
  ghDeleteFile(`drafts/${id}/data.json`, `削除: ${id}`).catch(() => {});
}

      <p class="tutorial-note">※初回保存時、Claude Codeがデータ構造を把握できるよう、案内ファイル（CLAUDE.md）をリポジトリに自動作成します（既にある場合は何もしません）。</p>

function copyModalField(id, label) {
  const v = document.getElementById(id)?.value.trim();
  if (!v) { showToast(label + 'はまだ設定されていません'); return; }
  copyText(v, '📋 ' + label + 'をコピーしました');
}

function saveRepoSettings() {
  githubPAT = document.getElementById('modal-pat')?.value.trim() ?? '';
  dataRepo  = (document.getElementById('modal-repo')?.value.trim() ?? '')
    .replace(/^https?:\/\/(www\.)?github\.com\//, '').replace(/^github\.com\//, '')
    .replace(/\.git$/, '').match(/^[\w.-]+\/[\w.-]+/)?.[0] ?? '';
  localStorage.setItem('ohire-github_pat', githubPAT);
  localStorage.setItem('ohire-data_repo', dataRepo);
  updateRepoBtn();
  document.querySelector('.modal-overlay')?.remove();
  showToast('GitHub同期設定を保存しました');
}

function updateRepoBtn() {
  const btn = document.getElementById('repo-btn');
  if (!btn) return;
  btn.style.color = (githubPAT && dataRepo) ? '#52c41a' : '#333';
}

// ==================== API Key ====================
function showApiKeyModal() {
  if (document.querySelector('.modal-overlay')) return;
  const provider = getSelectedProvider();
  if (provider === 'builtin') { showToast('ブラウザ内蔵AIはキー不要です'); return; }
  const info = PROVIDERS[provider];
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <h2>${info.name} APIキーを設定</h2>
      <p>APIキーはブラウザのlocalStorageにのみ保存されます。外部サーバーには送信されません。</p>
      <p>取得先: <a href="${info.keyUrl}" target="_blank" rel="noopener">${info.keyUrl}</a><br>${info.keyNote}</p>
      <input type="password" id="modal-key" placeholder="${info.placeholder}" autocomplete="off" />
      <button class="modal-btn" id="modal-save">保存</button>
    </div>
  `;
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);
  const input = document.getElementById('modal-key');
  input.value = apiKeys[provider]; input.focus();
  input.addEventListener('keydown', e => { if (e.key === 'Enter') saveApiKey(); });
  document.getElementById('modal-save').addEventListener('click', saveApiKey);
}

function saveApiKey() {
  const val = document.getElementById('modal-key')?.value.trim() ?? '';
  if (!val) return;
  const provider = getSelectedProvider();
  apiKeys[provider] = val;
  localStorage.setItem('ohire-apikey_' + provider, val);
  updateApiKeyBtn();
  document.querySelector('.modal-overlay')?.remove();
  showToast('APIキーを保存しました');
}

function updateApiKeyBtn() {
  const provider = getSelectedProvider();
  const btn = document.getElementById('api-key-btn');
  if (provider === 'builtin') {
    btn.style.borderColor = '#52c41a';
    btn.title = 'このプロバイダーはキー不要';
    return;
  }
  const hasKey = !!apiKeys[provider];
  btn.style.borderColor = hasKey ? '#52c41a' : '#e0e0e0';
  btn.title = hasKey ? 'APIキー設定済み（クリックで変更）' : 'APIキーを設定';
}

// ==================== Helpers ====================
function autoResize(el) { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; }

let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}
